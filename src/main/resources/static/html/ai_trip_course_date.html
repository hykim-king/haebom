<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해봄트립 - AI콕콕 플래너 기간 선택</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/ai_trip_course_date.css">

</head>
<body>
<div th:replace="~{main/header :: header}"></div>

<div class="scenery-bg">
    <div class="clouds"></div>
    <div class="clouds clouds-2"></div>
    <div class="mountains-bg"></div>
</div>

<div class="card-wrapper container">
    <div class="planner-card">
        <div class="card-header-custom">
            <div class="logo-text">AI콕콕 플래너</div>
            <div class="step-indicator">
                <span class="step-inactive">01</span>
                <div class="step-line"></div>
                <span class="step-active">02</span>
                <div class="step-line" style="background-color: #eee;"></div>
                <span class="step-inactive">03</span>
            </div>
        </div>

        <div class="sub-title">2박 3일은 2개 지역 선택 가능</div>
        <h1 class="main-title">
            여행 기간을<br>
            선택해 주세요.
        </h1>

        <div class="period-options">
            <div class="period-item" data-period="당일여행">
                <div class="period-circle"><i class="fa-regular fa-calendar"></i></div>
                <div class="period-text">당일여행</div>
            </div>
            <div class="period-item" data-period="1박 2일">
                <div class="period-circle"><i class="fa-regular fa-calendar-check"></i></div>
                <div class="period-text">1박 2일</div>
            </div>
            <div class="period-item" data-period="2박 3일">
                <div class="period-circle"><i class="fa-regular fa-calendar-plus"></i></div>
                <div class="period-text">2박 3일</div>
            </div>
        </div>

        <div class="btn-group-custom">
            <button class="btn-prev" onclick="history.back()">이전</button>
            <button class="btn-next" id="nextBtn" disabled>다음</button>
        </div>
    </div>
</div>

<div th:replace="~{main/footer :: footer}"></div>

<script>
    const periodItems = document.querySelectorAll('.period-item');
    const nextBtn = document.getElementById('nextBtn');
    let selectedPeriod = null;

    periodItems.forEach(item => {
        // [기존 로직 유지]
        item.addEventListener('click', () => {
            periodItems.forEach(el => el.classList.remove('selected'));
            item.classList.add('selected');
            selectedPeriod = item.getAttribute('data-period');
            nextBtn.disabled = false;
        });
    });

    nextBtn.addEventListener('click', () => {
        if (selectedPeriod) {
            alert(`${selectedPeriod}이 선택되었습니다. 마지막 단계로 이동합니다.`);
            location.href = 'ai_trip_course_theme.html'; // 테마 선택 페이지 이동 주석 추가
        }
    });
</script>
</body>
</html>
