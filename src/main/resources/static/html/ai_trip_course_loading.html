<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해봄트립 - AI콕콕 플래너 생성중</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/ai_trip_course_loading.css">
</head>
<body>
<div th:replace="~{main/header :: header}"></div>

<div class="scenery-bg">
    <div class="clouds"></div>
    <div class="clouds clouds-2"></div>
    <div class="mountains-bg"></div>
</div>

<main class="loading-wrapper container">
    <section class="loading-card" aria-live="polite">
        <div class="logo-text">AI콕콕 플래너</div>
        <h1 class="loading-title">여행 코스를 생성하고 있어요</h1>
        <p class="loading-description">선택한 테마를 바탕으로 맞춤 코스를 찾고 있습니다. 잠시만 기다려 주세요.</p>

        <div class="spinner-wrap" aria-hidden="true">
            <div class="spinner-ring"></div>
        </div>

        <p class="theme-preview" id="themePreview"></p>
    </section>
</main>

<div th:replace="~{main/footer :: footer}"></div>

<script>
    // [수정사항] 이전 페이지에서 저장한 테마를 표시해 사용자가 선택값을 확인할 수 있도록 처리
    const themePreview = document.getElementById('themePreview');
    const savedThemes = sessionStorage.getItem('aiTripSelectedThemes');
    if (savedThemes) {
        const parsedThemes = JSON.parse(savedThemes);
        if (Array.isArray(parsedThemes) && parsedThemes.length > 0) {
            themePreview.textContent = `선택 테마: ${parsedThemes.join(', ')}`;
        }
    }
</script>
</body>
</html>
