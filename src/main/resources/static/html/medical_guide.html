<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해봄트립 - 의료가이드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/medical_guide.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div id="header"></div>

<main class="container">
    <div class="header-section">
        <h1 class="fw-bold mb-2">우리동네 의료가이드</h1>
        <p class="text-secondary fw-medium">여행 중 아플 때, 가까운 병원과 약국을 찾아보세요.</p>
    </div>

    <div class="main-card">
        <div class="tab-group">
            <button id="tab-hospital" class="tab-btn active" onclick="switchTab('hospital', this)">
                <i data-lucide="stethoscope" size="18"></i>
                <span>병원</span>
            </button>
            <button id="tab-pharmacy" class="tab-btn" onclick="switchTab('pharmacy', this)">
                <i data-lucide="pill" size="18"></i>
                <span>약국</span>
            </button>
        </div>

        <div class="region-filter-container mb-3">
            <button class="region-btn" onclick="selectRegion('전체', this)">전체</button>
            <button class="region-btn active" onclick="selectRegion('서울', this)">서울</button>
            <button class="region-btn" onclick="selectRegion('경기', this)">경기</button>
            <button class="region-btn" onclick="selectRegion('인천', this)">인천</button>
            <button class="region-btn" onclick="selectRegion('강원', this)">강원</button>
            <button class="region-btn" onclick="selectRegion('제주', this)">제주</button>
            <button class="region-btn" onclick="selectRegion('부산', this)">부산</button>
            <button class="region-btn" onclick="selectRegion('대구', this)">대구</button>
            <button class="region-btn" onclick="selectRegion('광주', this)">광주</button>
            <button class="region-btn" onclick="selectRegion('대전', this)">대전</button>
        </div>

        <div class="search-container">
            <i data-lucide="search" size="20"></i>
            <input type="text" class="search-input" placeholder="병원명, 약국명 또는 도로명 주소 검색">
        </div>

        <div id="result-list"></div>

        <div class="pagination-container">
            <button class="page-btn arrow-btn"><i data-lucide="chevron-left" size="18"></i></button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn arrow-btn"><i data-lucide="chevron-right" size="18"></i></button>
        </div>
    </div>
</main>

<div id="footer"></div>

<script src="../javascript/medical_guide.js"></script>
<script>
    // 페이지 로드 시 초기화 (데이터 렌더링 및 레이아웃 호출)
    window.onload = () => {
        if (typeof renderList === 'function') renderList();
        lucide.createIcons();
    };

    // 헤더/푸터 공통 컴포넌트 호출
    const includeHTML = (id, file) => {
        fetch(file)
            .then(res => res.text())
            .then(html => document.getElementById(id).innerHTML = html)
            .catch(err => console.log(`${file} load failed`));
    };

    includeHTML("header", "header.html");
    includeHTML("footer", "footer.html");
</script>

</body>
</html>
