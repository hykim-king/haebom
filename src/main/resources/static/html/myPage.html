<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해봄트립 - 마이페이지</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/myPage.css">
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />
</head>
<body>
    <div id="header"></div>

    <main class="container py-5">
        <div class="row g-4">
            <aside class="col-lg-3">
                <div class="glass-card p-4 text-center animate-up">
                    <div class="profile-img-container mx-auto">
                        <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&q=80&w=200" alt="프로필">
                    </div>
                    <h4 class="mt-3 fw-bold mb-1" id="sidebar-nickname">여행자123</h4>
                    <p class="text-secondary small mb-4">traveler@example.com</p>
                    
                    <div class="text-start mb-4">
                        <label class="small fw-bold text-secondary mb-2 d-block">나의 해시태그</label>
                        <div id="hashtag-container" class="d-flex flex-wrap gap-2">
                            <span class="badge bg-primary-subtle rounded-pill px-3 py-2">#여행러</span>
                        </div>
                    </div>

                    <hr class="my-4" style="opacity: 0.1;">

                    <div class="d-grid">
                        <button class="btn btn-outline-warning rounded-pill py-2 d-flex align-items-center justify-content-center gap-2 border-2 fw-bold custom-btn-orange" 
                                onclick="location.href='mailto:support@example.com'">
                            <i data-lucide="message-circle" size="18"></i> 문의하기
                        </button>
                    </div>
                </div>
            </aside>

            <section class="col-lg-9">
                <div class="my-menu-container animate-up">
                    <div class="menu-header">
                        <h5 class="fw-bold mb-4">마이 메뉴</h5>
                        <ul class="nav nav-pills d-flex w-100" id="myMenuTab" role="tablist">
                            <li class="nav-item flex-fill" role="presentation">
                                <button class="nav-link active w-100" data-bs-toggle="pill" data-bs-target="#info-pane" type="button">
                                    <i data-lucide="user"></i> 내 정보
                                </button>
                            </li>
                            <li class="nav-item flex-fill" role="presentation">
                                <button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#wish-pane" type="button">
                                    <i data-lucide="heart"></i> 찜 목록
                                </button>
                            </li>
                        </ul>
                    </div>

                    <div class="tab-content tab-content-area" id="myMenuTabContent">
                        <div class="tab-pane fade show active" id="info-pane" role="tabpanel">
                            <h5 class="fw-bold mb-4">내 정보 관리</h5>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">이름</label>
                                    <input type="text" class="form-control rounded-3 p-3 bg-light border-0" value="김여행" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-secondary">연락처</label>
                                    <input type="text" class="form-control rounded-3 p-3 bg-light border-0" value="010-1234-5678" readonly>
                                </div>

                                <div class="col-12">
                                    <div class="p-3 rounded-4 border bg-light shadow-sm">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div>
                                                <label class="form-label small fw-bold text-secondary mb-0">닉네임</label>
                                                <p class="small text-muted mb-0" id="display-nickname">여행자123</p>
                                            </div>
                                            <button class="btn btn-sm btn-dark rounded-pill px-3" id="btn-nick-edit-toggle">변경하기</button>
                                        </div>
                                        <div id="nick-edit-fields" class="mt-3 d-none animate-up p-3 bg-white rounded-3 border">
                                            <div class="d-flex gap-2">
                                                <input type="text" id="new-nickname" class="form-control rounded-3 p-2 bg-light border-0" placeholder="새 닉네임 입력">
                                                <button class="btn btn-primary btn-sm px-4 rounded-3 btn-orange-bg" id="btn-nick-save">저장</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="p-3 rounded-4 border bg-light shadow-sm">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div>
                                                <label class="form-label small fw-bold text-secondary mb-0">비밀번호 관리</label>
                                                <p class="small text-muted mb-0">안전을 위해 정기적으로 변경해 주세요.</p>
                                            </div>
                                            <button class="btn btn-sm btn-dark rounded-pill px-3" id="btn-pw-edit-toggle">변경하기</button>
                                        </div>
                                        <div id="pw-edit-fields" class="mt-3 d-none animate-up p-3 bg-white rounded-3 border">
                                            <div class="row g-3">
                                                <div class="col-md-6">
                                                    <label class="small text-secondary mb-1">변경할 비밀번호</label>
                                                    <input type="password" id="new-pw" class="form-control rounded-3 p-2 bg-light border-0" placeholder="새 비밀번호">
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="d-flex justify-content-between">
                                                        <label class="small text-secondary mb-1">비밀번호 확인</label>
                                                        <span id="pw-match-feedback" class="small fw-bold"></span>
                                                    </div>
                                                    <input type="password" id="confirm-pw" class="form-control rounded-3 p-2 bg-light border-0" placeholder="비밀번호 확인">
                                                </div>
                                                <div class="col-12 text-end">
                                                    <button class="btn btn-primary btn-sm px-4 btn-orange-bg" id="btn-pw-save">저장</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="p-3 rounded-4 border bg-light shadow-sm">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div>
                                                <label class="form-label small fw-bold text-secondary mb-0">주소지 관리</label>
                                                <p class="small text-muted mb-0" id="current-addr-text">등록된 주소지로 배송 및 서비스가 제공됩니다.</p>
                                            </div>
                                            <button class="btn btn-sm btn-dark rounded-pill px-3" id="btn-addr-edit-toggle">수정하기</button>
                                        </div>
                                        <div id="addr-edit-fields" class="mt-3 d-none animate-up p-3 bg-white rounded-3 border">
                                            <div class="row g-3">
                                                <div class="col-7 col-md-4">
                                                    <label class="small text-secondary mb-1">우편번호</label>
                                                    <input type="text" id="postcode" class="form-control rounded-3 p-2 bg-light border-0" placeholder="우편번호" readonly>
                                                </div>
                                                <div class="col-5 col-md-3 d-flex align-items-end">
                                                    <button class="btn btn-outline-warning btn-sm w-100 py-2 fw-bold custom-btn-orange" onclick="execPostCode()">번호 검색</button>
                                                </div>
                                                <div class="col-12">
                                                    <label class="small text-secondary mb-1">기본 주소</label>
                                                    <input type="text" id="address-base" class="form-control rounded-3 p-2 bg-light border-0" placeholder="주소 검색 시 자동 입력됩니다" readonly>
                                                </div>
                                                <div class="col-12">
                                                    <label class="small text-secondary mb-1">상세 주소</label>
                                                    <input type="text" id="address-detail" class="form-control rounded-3 p-2 bg-white border" placeholder="예: 101동 222호">
                                                </div>
                                                <div class="col-12 text-end">
                                                    <button class="btn btn-primary btn-sm px-4 btn-orange-bg" id="btn-addr-save">주소 저장</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <label class="form-label small fw-bold text-secondary mb-0">관심 해시태그</label>
                                        <button class="btn btn-sm text-primary p-0" data-bs-toggle="modal" data-bs-target="#hashtagModal">
                                            <i data-lucide="edit-3" size="16"></i> 수정하기
                                        </button>
                                    </div>
                                    <div id="selected-hashtags-display" class="p-3 bg-light rounded-4 d-flex flex-wrap gap-2 border-0">
                                        <span class="text-muted small">수정하기 버튼을 눌러 관심 키워드를 선택해주세요.</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="wish-pane" role="tabpanel">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold mb-0">찜 목록 <span class="text-primary fs-6">1</span></h5>
                            </div>
                            <div class="row g-4">
                                <div class="col-md-4 col-sm-6">
                                    <div class="card wish-card border-0 shadow-sm overflow-hidden rounded-4">
                                        <div class="position-relative">
                                            <img src="https://images.unsplash.com/photo-1571767454026-0677e112c300?auto=format&fit=crop&q=80&w=400" class="card-img-top" alt="제주도">
                                            <button class="btn btn-white btn-sm position-absolute top-0 end-0 m-2 rounded-circle shadow-sm">
                                                <i data-lucide="heart" class="text-danger" style="fill:#ef4444" size="16"></i>
                                            </button>
                                        </div>
                                        <div class="card-body p-3">
                                            <h6 class="fw-bold mb-1">제주 함덕 서우봉</h6>
                                            <p class="text-secondary small mb-0"><i data-lucide="map-pin" size="12"></i> 제주 제주시</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <div class="modal fade" id="hashtagModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">취향 키워드 선택</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-3" style="max-height: 60vh; overflow-y: auto;">
                    <p class="small text-secondary mb-4">선호하는 여행 키워드를 모두 선택해 주세요.</p>
                    <div id="hashtag-selection-groups"></div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4 btn-orange-bg" id="btn-save-hashtags">저장하기</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../javascript/header.js"></script>
    
    <script src="../javascript/myPage.js"></script>

    <script>
      // 헤더 로드
      fetch("header.html")
        .then((res) => res.text())
        .then((html) => {
            document.getElementById("header").innerHTML = html;
            lucide.createIcons(); // 헤더 로드 후 아이콘 실행
        });
    </script>
</body>
</html>
