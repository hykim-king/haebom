<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해봄트립 - 글쓰기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/notice_write.css">
</head>
<body>

<div id="header"></div>

<div class="write-container">
    <form id="writeForm">
        <div class="write-card">
            <div class="write-header">
                <select class="category-select" id="postCategory">
                    <option value="notice">공지사항</option>
                    <option value="event">이벤트</option>
                    <option value="update">업데이트</option>
                </select>
                <input type="text" class="write-title-input" placeholder="제목을 입력해 주세요" id="postTitle" required>
            </div>

            <div class="write-body">
                <textarea class="content-textarea" placeholder="해봄트립의 소식을 자유롭게 작성해 보세요..." id="postContent" required></textarea>
            </div>

            <div class="attachment-bar">
                <div class="attach-item" id="fileAttachBtn">
                    <i data-lucide="paperclip" size="18"></i> 파일추가
                </div>
                <input type="file" id="fileInput" style="display: none;">
            </div>

            <div class="write-footer">
                <button type="button" class="btn-cancel" onclick="history.back()">취소</button>
                <button type="submit" class="btn-register">등록</button>
            </div>
        </div>
    </form>
</div>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../javascript/notice_write.js"></script>
<script>
    // 주석: 헤더/푸터 인클루드 및 아이콘 렌더링
    const loadComponent = (id, url) => {
        return fetch(url).then(res => res.text()).then(html => {
            document.getElementById(id).innerHTML = html;
        });
    };

    window.onload = () => {
        Promise.all([
            loadComponent("header", "header.html"),
            loadComponent("footer", "footer.html")
        ]).then(() => {
            lucide.createIcons();
        });
    };
</script>
</body>
</html>
