<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해봄트립 - 고객지원</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/support.css">
</head>
<body>
<div id="header"></div>

<main class="container pb-5">
    <div class="tab-container">
        <button class="tab-btn active" id="tab-faq" onclick="switchTab('faq')">자주 묻는 질문</button>
        <button class="tab-btn" id="tab-inquiry" onclick="switchTab('inquiry')">문의게시판</button>
    </div>

    <section id="faq-section" class="content-section active">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div id="faq-list">
                </div>
            </div>
        </div>
    </section>

    <section id="inquiry-section" class="content-section">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="board-card">
                    <div id="inquiry-list">
                    </div>
                    <div class="write-btn-container">
                        <button class="btn btn-primary px-4 py-2 rounded-3 fw-bold shadow-sm" onclick="location.href='notice_write.html'">
                            <i data-lucide="edit-3" size="18" class="me-1"></i> 글쓰기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../javascript/support.js"></script>
<script>
    // 공통 컴포넌트 로드 및 초기화
    const loadComponent = (id, url) => {
        return fetch(url).then(res => res.text()).then(html => {
            document.getElementById(id).innerHTML = html;
        });
    };

    window.onload = () => {
        Promise.all([
            loadComponent("header", "header.html"),
            loadComponent("footer", "footer.html")
        ]).then(() => {
            if (typeof renderFAQ === 'function') renderFAQ();
            if (typeof renderInquiry === 'function') renderInquiry();
            lucide.createIcons();
        });
    };
</script>
</body>
</html>
