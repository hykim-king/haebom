<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="_csrf" content="${_csrf.token}">
    <meta name="_csrf_header" content="${_csrf.headerName}">

    <meta name="referrer" content="no-referrer">

    <title>해봄트립 - 테마</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (아이콘용) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/Thema.css">

</head>

<body>

    <div id="header"></div>

    <!-- 카테고리 -->
    <div class="theme-bar-wrapper">

        <div class="theme-inner">

            <div class="category-swiper-wrap">

                <div class="swiper categorySwiper">
                    <div class="swiper-wrapper" id="categoryWrapper"></div>
                </div>

                <div class="swiper-button-prev"><i data-lucide="chevron-left"></i></div>
                <div class="swiper-button-next"><i data-lucide="chevron-right"></i></div>

            </div>

        </div>

    </div>

    <div class="thema-header">
        <div class="header-flex-box">
            <h4 class="thema-sub">🧭테마를 선택해서 나만의 여행을 찾아보세요!🗺️</h4>

            <div class="sort-container">
                <button type="button" id="sortByHits" class="btn-sort">
                    <i class="fa-solid fa-fire me-1"></i> 조회수순
                </button>
            </div>
        </div>
    </div>


    <!-- Section 1: AI Recommendation -->
    <main class="container">


        <!-- Section 3: Local Recommendations (NEW) -->
        <section class="local-section container">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4" id="localTravelGrid">
                <!-- Cards rendered here by JS -->
            </div>

            <!-- More Button -->
            <button class="btn-more" id="loadMoreLocalBtn">
                테마 여행지 더보기
                <i class="fa-solid fa-chevron-down"></i>
            </button>
        </section>

    </main>

    <!-- Footer Space -->
    <div id="footer"></div>

</body>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script src="../javascript/Thema.js"></script>
<!-- <script src="../javascript/AI-widget.js"></script> -->

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- <script src="../javascript/AItripRecommend.js"></script> -->

<script>
    fetch("/html/header.html")
        .then((res) => res.text())
        .then((html) => (document.getElementById("header").innerHTML = html));
    fetch("/html/footer.html")
        .then((res) => res.text())
        .then((html) => (document.getElementById("footer").innerHTML = html));
</script>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();
</script>

</html>
