<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해봄트립 - 여행지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/trip.css">
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />
</head>

<body>
    <!-- Header -->
    <div id="header"></div>

    <div id="main-wrapper">
        <main class="max-w-6xl mx-auto px-4 py-10 w-full">
            <div id="home-view" class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-8 order-2 lg:order-1">
                    <div class="flex justify-between items-end mb-6 pb-4 border-b-2 border-gray-900">
                        <div class="flex items-center gap-4">
                            <h2 class="text-3xl font-bold">#<span id="view-title">전체</span></h2>
                        </div>
                        <div class="flex gap-4 text-sm text-gray-400 font-medium">
                            <span class="text-orange-600 font-bold">총 <span id="total-count">0</span>건</span>
                            <button class="text-gray-900 font-bold underline">최신순</button>
                            <span>|</span> 
                            <button class="hover:text-gray-900">인기순</button>
                        </div>
                    </div>
                    <div id="dest-list" class="space-y-10"></div>
                </div>

                <aside class="lg:col-span-4 order-1 lg:order-2">
                    <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100 sticky top-10 shadow-sm">
                        <div class="flex items-center bg-white border rounded-lg px-3 py-2 mb-6 shadow-sm">
                            <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="검색어 입력" class="w-full text-sm outline-none">
                            <button onclick="location.reload()"><i data-lucide="refresh-cw" size="18" class="text-gray-400"></i></button>
                        </div>
                        
                        <div id="main-region-tags" class="flex flex-wrap gap-x-3 gap-y-2 mb-6 border-b pb-6"></div>
                        <div id="sub-region-tags" class="flex flex-wrap gap-x-4 gap-y-3 mb-6 text-sm text-gray-500 border-b pb-6"></div>
                        
                        <h4 class="font-bold text-sm mb-4 text-gray-900">테마별 선택</h4>
                        <div id="theme-tags" class="flex flex-wrap gap-x-3 gap-y-2 text-sm text-gray-400 border-b pb-6 mb-6"></div>
                        
                        <div class="space-y-4">
                            <div class="bg-red-50 border border-red-100 p-4 rounded-xl flex items-start gap-3">
                                <i data-lucide="alert-triangle" class="text-red-500 shrink-0" size="20"></i>
                                <div>
                                    <h5 class="text-red-700 font-bold text-sm">기상/재난 특보</h5>
                                    <p class="text-red-600 text-xs mt-1 leading-relaxed">현재 발령된 특보가 없습니다.</p>
                                </div>
                            </div>

                            <div class="bg-white border border-gray-100 p-4 rounded-xl shadow-sm">
                                <div class="flex justify-between items-center mb-3">
                                    <h5 class="font-bold text-sm text-gray-800">
                                        <span id="selected-region-name">전국</span> 날씨 정보
                                    </h5>
                                    <span class="text-[10px] text-gray-400">실시간 정보</span>
                                </div>
                                <div class="space-y-3">
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-gray-500">현재 기온</span>
                                        <span id="weather-temp" class="text-sm font-bold text-black-600">- ℃</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-gray-500">날씨 상태</span>
                                        <span id="weather-status" class="text-sm font-medium">-</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-gray-500">풍량</span>
                                        <span id="weather-wind" class="text-sm font-medium">- m/s</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-gray-500">미세먼지</span>
                                        <span id="weather-dust" class="px-2 py-0.5 rounded-full text-[10px] text-white bg-gray-300">데이터 없음</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
            <div id="detail-view" class="hidden">
                <div id="detail-content"></div>
            </div>
        </main>
    </div>
    <!-- Footer -->
    <div id="footer"></div>

    <script>
        fetch("header.html")
            .then((res) => res.text())
            .then((html) => (document.getElementById("header").innerHTML = html));

        fetch("footer.html")
            .then((res) => res.text())
            .then((html) => (document.getElementById("footer").innerHTML = html));
    </script>

    <!-- JS -->
    <script src="../javascript/trip.js"></script>
    <script src="../javascript/header.js"></script>
</body>

</html>
