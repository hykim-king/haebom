<!DOCTYPE html>
<html lang="kr" xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="footerLayout">


    </main>
  </div>
  
  <!-- ===================================
       모달: 사용자 수정
  =================================== -->
  <div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">사용자 정보 수정</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- 수정할 사용자 ID (hidden) -->
          <input type="hidden" id="edit-user-id">
          <!-- 이름 입력 -->
          <div class="mb-3">
            <label class="form-label">이름</label>
            <input type="text" class="form-control" id="edit-user-name">
          </div>
          <!-- 이메일 입력 -->
          <div class="mb-3">
            <label class="form-label">이메일</label>
            <input type="email" class="form-control" id="edit-user-email">
          </div>
          <!-- 닉네임 입력 -->
          <div class="mb-3">
            <label class="form-label">닉네임</label>
            <input type="text" class="form-control" id="edit-user-nickname">
          </div>
          <!-- 상태 선택 -->
          <div class="mb-3">
            <label class="form-label">상태</label>
            <select class="form-select" id="edit-user-status">
              <option value="active">활성</option>
              <option value="inactive">비활성</option>
              <option value="suspended">정지</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
          <button type="button" class="btn btn-primary" onclick="updateUser()">저장</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- ===================================
       모달: 신고 상세 정보
  =================================== -->
  <div class="modal fade" id="reportDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">신고 상세 정보</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- 신고 ID (hidden) -->
          <input type="hidden" id="report-id">
          <!-- 신고 유형 -->
          <div class="mb-3">
            <label class="form-label fw-bold">신고 유형</label>
            <p id="report-type"></p>
          </div>
          <!-- 신고 대상 -->
          <div class="mb-3">
            <label class="form-label fw-bold">신고 대상</label>
            <p id="report-target"></p>
          </div>
          <!-- 신고 내용 -->
          <div class="mb-3">
            <label class="form-label fw-bold">신고 내용</label>
            <p id="report-content"></p>
          </div>
          <!-- 신고자 -->
          <div class="mb-3">
            <label class="form-label fw-bold">신고자</label>
            <p id="report-reporter"></p>
          </div>
          <!-- 신고 날짜 -->
          <div class="mb-3">
            <label class="form-label fw-bold">신고 날짜</label>
            <p id="report-date"></p>
          </div>
          <hr>
          <!-- 처리 상태 선택 -->
          <div class="mb-3">
            <label class="form-label fw-bold">처리 상태</label>
            <select class="form-select" id="report-status-select">
              <option value="pending">대기중</option>
              <option value="completed">처리완료</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" onclick="deleteReportedContent()">신고된 콘텐츠 삭제</button>
          <button type="button" class="btn btn-primary" onclick="updateReportStatus()">상태 업데이트</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- ===================================
       모달: 문의 답변
  =================================== -->
  <div class="modal fade" id="inquiryReplyModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">문의 답변</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- 문의 ID (hidden) -->
          <input type="hidden" id="inquiry-id">
          <!-- 문의 제목 -->
          <div class="mb-3">
            <label class="form-label fw-bold">제목</label>
            <p id="inquiry-title"></p>
          </div>
          <!-- 문의 내용 -->
          <div class="mb-3">
            <label class="form-label fw-bold">문의 내용</label>
            <p id="inquiry-content"></p>
          </div>
          <!-- 작성자 정보 -->
          <div class="mb-3">
            <label class="form-label fw-bold">작성자</label>
            <p id="inquiry-author"></p>
          </div>
          <hr>
          <!-- 답변 입력 -->
          <div class="mb-3">
            <label class="form-label fw-bold">답변 내용</label>
            <textarea class="form-control" id="inquiry-reply" rows="5" placeholder="답변을 입력하세요..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
          <button type="button" class="btn btn-primary" onclick="submitInquiryReply()">답변 등록</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Admin JS -->
  <script th:src="@{/javascript/admin_new.js}"></script>
  
  <script>
    // Lucide 아이콘 초기화
    lucide.createIcons();
  </script>
  
</body>
</html>
</th>
</html>
