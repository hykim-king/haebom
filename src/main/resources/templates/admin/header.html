<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="headerLayout">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <title>관리자 페이지 - 해봄트립</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
  <!-- Admin CSS -->
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
  <!-- ===================================
       관리자 페이지 전체 래퍼
  =================================== -->
  <div class="admin-wrapper">
    
    <!-- ===================================
         왼쪽 사이드바 네비게이션
    =================================== -->
    <aside class="admin-sidebar">
      <!-- 사이드바 헤더 영역 (로고 및 타이틀) -->
      <div class="sidebar-header">
        <img src="../img/haebom_HeaderLogo.png" alt="해봄트립" class="admin-logo">
      </div>
      
      <!-- 사이드바 메뉴 네비게이션 -->
      <nav class="sidebar-nav">
        <!-- 사용자 관리 메뉴 (기본 활성화) -->
        <a href="#users" class="nav-item" data-section="users">
          <i data-lucide="users"></i>
          <span>사용자 관리</span>
        </a>
        <!-- 댓글 관리 메뉴 -->
        <a href="#comments" class="nav-item" data-section="comments">
          <i data-lucide="message-square"></i>
          <span>댓글 관리</span>
        </a>
        <!-- 신고 접수 메뉴 -->
        <a href="#reports" class="nav-item" data-section="reports">
          <i data-lucide="alert-triangle"></i>
          <span>신고 접수</span>
        </a>
        <!-- 문의사항 메뉴 -->
        <a href="#inquiries" class="nav-item" data-section="inquiries">
          <i data-lucide="help-circle"></i>
          <span>문의사항</span>
        </a>
        <!-- 데이터 통계 메뉴 -->
        <a href="#statistics" class="nav-item active" data-section="statistics">
          <i data-lucide="bar-chart-2"></i>
          <span>데이터 통계</span>
        </a>
      </nav>
    </aside>
    
    <!-- ===================================
         오른쪽 메인 콘텐츠 영역
    =================================== -->
    <main class="admin-main">

        

</th:block>
</html>
