<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI콕콕 플래너 - 로딩 중</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/ai_trip_course_loading.css}">
</head>

<body>

<!-- 헤더 포함 -->
<div th:replace="~{main/header :: header}"></div>

<!--
    [수정사항] 이전 페이지(locate)에서 사용했던 배경 요소들을 추가했어.
    이게 있어야 구름이랑 산 배경이 제대로 보여!
-->
<div class="scenery-bg">
    <div class="clouds"></div>
    <div class="clouds clouds-2"></div>
    <div class="mountains-bg"></div>
</div>

<div class="card-wrapper container">
    <div class="planner-card text-center">
        <!-- 상단 로고 -->
        <div class="card-header-custom">
            <div class="logo-text">AI콕콕 플래너</div>
        </div>

        <!-- 로딩 애니메이션 영역 -->
        <div class="loading-container">
            <div class="ai-pulse-circle">
                <div class="inner-circle"></div>
                <div class="orbit">
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <!-- 로딩 텍스트 영역 -->
        <div class="loading-text-wrap">
            <!-- [주석] 자바스크립트로 문구가 변경되는 부분이야 -->
            <h1 class="loading-main-title" id="loadingTitle">AI가 여행을 설계하고 있어요</h1>
            <p class="loading-sub-text" id="loadingSub">선택하신 지역의 정보를 분석 중입니다...</p>
        </div>

        <!-- 진행바 -->
        <div class="progress-container">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>

        <div class="info-msg mt-4">
            잠시만 기다려 주세요!<br>
            당신에게 딱 맞는 여행 코스를 만들고 있습니다.
        </div>
    </div>
</div>

<!-- 푸터 포함 -->
<div th:replace="~{main/footer :: footer}"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    // ✅ 컨트롤러에서 넘겨준 recommend URL
    var redirectUrl = /*[[${redirectUrl}]]*/ '/course/ai/recommend';
    /*]]>*/
</script>

<script>
    /* ========================================================
       로딩 메시지 순차 변경 및 진행바 로직
       ======================================================== */
    const titles = [
        "AI가 여행을 설계하고 있어요",
        "최적의 이동 경로를 계산 중입니다",
        "지역 맛집과 명소를 선별하고 있어요",
        "거의 다 완성되었습니다!"
    ];

    const subs = [
        "선택하신 지역의 정보를 분석 중입니다...",
        "가장 효율적인 동선을 확인하고 있습니다.",
        "리뷰가 좋은 장소들을 모으고 있습니다.",
        "마지막 확인 작업을 진행 중입니다."
    ];

    let currentIndex = 0;
    const titleEl    = document.getElementById('loadingTitle');
    const subEl      = document.getElementById('loadingSub');
    const progressEl = document.getElementById('progressBar');

    // 2초마다 텍스트 변경
    const messageInterval = setInterval(() => {
        currentIndex++;
        if (currentIndex < titles.length) {
            titleEl.innerText = titles[currentIndex];
            subEl.innerText   = subs[currentIndex];
        } else {
            clearInterval(messageInterval);
        }
    }, 2000);

    // 진행바 애니메이션 → 100% 도달 시 recommend 페이지로 이동
    let progress = 0;
    const progressInterval = setInterval(() => {
        progress += 1;
        progressEl.style.width = progress + '%';

        if (progress >= 100) {
            clearInterval(progressInterval);
            // ✅ 로딩 완료 후 AI 추천 결과 페이지로 이동
            location.href = redirectUrl;
        }
    }, 80); // 80ms × 100 = 약 8초 로딩
</script>

</body>
</html>
