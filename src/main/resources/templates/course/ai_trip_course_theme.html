<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해봄트립 - AI콕콕 플래너 테마 선택</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/header.css}">
	<link rel="stylesheet" th:href="@{/css/footer.css}">
	<link rel="stylesheet" th:href="@{/css/ai_trip_course_theme.css}">
</head>
<body>

<div th:replace="~{main/header :: header}"></div>

<div class="scenery-bg">
    <div class="clouds"></div>
    <div class="clouds clouds-2"></div>
    <div class="mountains-bg"></div>
</div>

<div class="card-wrapper container">
    <div class="planner-card">
        <div class="card-header-custom">
            <div class="logo-text">AI콕콕 플래너</div>
            <div class="step-indicator">
                <span class="step-inactive">01</span>
                <div class="step-line"></div>
                <span class="step-inactive">02</span>
                <div class="step-line"></div>
                <span class="step-active">03</span>
            </div>
        </div>

        <div class="sub-title">마지막으로 이번 여행의 테마를 정해볼까요?</div>
        <h1 class="main-title">
            원하는 여행 테마를 2개 이상<br>
            선택해 주세요. (최대 4개)
        </h1>
		
		<div class="theme-grid" id="themeGrid">
		
		<div class="theme-item" data-theme="산">
    <div class="theme-circle">
        <div class="theme-text">산</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="폭포">
	    <div class="theme-circle">
	        <div class="theme-text">폭포</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="계곡">
	    <div class="theme-circle">
	        <div class="theme-text">계곡</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="바다">
	    <div class="theme-circle">
	        <div class="theme-text">바다</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="호수">
	    <div class="theme-circle">
	        <div class="theme-text">호수</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="강">
	    <div class="theme-circle">
	        <div class="theme-text">강</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="동굴">
	    <div class="theme-circle">
	        <div class="theme-text">동굴</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="역사">
	    <div class="theme-circle">
	        <div class="theme-text">역사</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="사찰">
	    <div class="theme-circle">
	        <div class="theme-text">사찰</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="온천/욕장/스파">
	    <div class="theme-circle">
	        <div class="theme-text">온천/스파</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="테마공원">
	    <div class="theme-circle">
	        <div class="theme-text">테마공원</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="체험">
	    <div class="theme-circle">
	        <div class="theme-text">체험</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="기념/전망">
	    <div class="theme-circle">
	        <div class="theme-text">기념/전망</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="문화시설">
	    <div class="theme-circle">
	        <div class="theme-text">문화시설</div>
	    </div>
	</div>
	
	<div class="theme-item" data-theme="레포츠">
	    <div class="theme-circle">
	        <div class="theme-text">레포츠</div>
	    </div>
	</div>
		
		</div>

        <div class="btn-group-custom">
            <button class="btn-prev" onclick="history.back()">이전</button>
            <button class="btn-finish" id="finishBtn" disabled>완료</button>
        </div>

    </div>
</div>

<div th:replace="~{main/footer :: footer}"></div>

<script>
    // ... [기존 스크립트 코드 유지] ...
    const themeItems = document.querySelectorAll('.theme-item');
    const finishBtn = document.getElementById('finishBtn');
    let selectedThemes = new Set();

    themeItems.forEach(item => {
        item.addEventListener('click', () => {
            const theme = item.getAttribute('data-theme');
            if (selectedThemes.has(theme)) {
                selectedThemes.delete(theme);
                item.classList.remove('selected');
            } else {
                if (selectedThemes.size >= 4) {
                    alert("최대 4개까지만 선택 가능합니다.");
                    return;
                }
                selectedThemes.add(theme);
                item.classList.add('selected');
            }
            finishBtn.disabled = selectedThemes.size < 2;
        });
    });

    finishBtn.addEventListener('click', () => {

        const themes = Array.from(selectedThemes);
        const region = localStorage.getItem("regionName");
        const days = localStorage.getItem("days");

        const gungu = localStorage.getItem("gunguName");

        let url = `/course/ai/recommend?regionName=${encodeURIComponent(region)}&days=${days}`;

        if(gungu){
            url += `&gunguName=${encodeURIComponent(gungu)}`;
        }
        themes.forEach(t => {
            url += `&themes=${encodeURIComponent(t)}`;
        });

        location.href = url;
    });
    
</script>
</body>
</html>
