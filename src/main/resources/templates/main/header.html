<div th:fragment="header">
  <nav class="header">
    <div class="header-inner">

      <!-- ✅ 로고: static index로 가지 말고 메인 라우트로(세션/템플릿 유지) -->
      <!-- 너 메인이 /main/main.do 라서 그걸로 맞춤 -->
      <a th:href="@{/main/main.do}" class="logo">
        <img src="../img/haebom_header_logo.png" alt="해봄이" class="logo-icon">
      </a>

      <ul class="nav-menu">
        <li><a href="#">여행지</a></li>
        <li><a href="#">여행지 코스</a></li>
        <li><a href="#">테마</a></li>

        <li class="dropdown">
          <a href="#" class="dropdown-toggle">추천 AI</a>
          <ul class="dropdown-menu">
            <li><a href="#">여행지 AI</a></li>
            <li><a href="#">여행코스 AI</a></li>
          </ul>
        </li>

        <li><a href="#">의료가이드</a></li>
      </ul>

      <!-- util-menu / nav-actions 구조 유지 -->
      <div id="auth-buttons" class="util-menu">

        <!-- 비로그인 상태 -->
        <div class="nav-actions" th:if="${session.user == null}">
          <a th:href="@{/user/login}">로그인</a>
          <a th:href="@{/user/signup}">회원가입</a>
        </div>

        <!-- 로그인 상태 -->
        <div class="nav-actions" th:if="${session.user != null}">
          <span class="welcome"
                th:text="${session.user.userNm} + '님 환영합니다'">
            사용자님 환영합니다
          </span>

          <!-- ✅ 로그아웃: button 클릭만으로는 세션이 안 지워짐 → form POST로 변경 -->
          <form th:action="@{/user/logout}" method="post" style="margin:0; display:inline;">
            <!-- ✅ CSRF 켜져 있으면 필요 (꺼져 있으면 있어도 무해) -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- 기존 class/logout-link 유지 -->
            <button type="submit" id="logoutBtn" class="logout-link">로그아웃</button>
          </form>
        </div>

      </div>
    </div>
  </nav>
</div>
