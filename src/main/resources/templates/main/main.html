<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>해봄트립 - 설렘 가득한 국내 여행</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <link rel="stylesheet" th:href="@{/css/main.css}" />
  <link rel="stylesheet" th:href="@{/css/header.css}" />
  <link rel="stylesheet" th:href="@{/css/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/ai_widget.css}" />
</head>

<body>
<div th:replace="~{main/header :: header}"></div>

<main class="main">
  <section class="hero">
    <div id="hero-slider"></div>
    <div class="hero-inner">
      <span class="hero-badge">새로운 여행의 시작, 해봄트립</span>
      <h1 class="hero-title">
        설렘 가득한 여행을<br />
        <strong>해봄!</strong>
      </h1>
      <p class="hero-desc">
        사계절 언제나 아름다운 대한민국,<br />
        당신만의 특별한 여행을 시작하세요.
      </p>
      <div class="hero-search">
        <input type="text" placeholder="어디로 떠나고 싶으신가요?" />
        <button class="hero-btn">검색</button>
      </div>
    </div>
  </section>

  <section class="container py-5 popular-section">
    <h2 class="fw-bold mb-4 d-flex align-items-center gap-2">
      <i data-lucide="trending-up" class="text-primary"></i>
      실시간 인기 관광지
    </h2>
    <div id="popularList" class="list-group border-0">
      <a th:each="trip, iterStat : ${popularList}"
         th:href="@{/trip/trip_view(tripContsId=${trip.tripContsId})}"
         class="list-group-item popular-item d-flex align-items-center shadow-sm rounded-4 mb-3 border-0">

        <div class="me-4 text-center" style="width: 50px;">
          <span class="rank-medal" th:text="${iterStat.count == 1 ? '🥇' : (iterStat.count == 2 ? '🥈' : (iterStat.count == 3 ? '🥉' : iterStat.count))}"></span>
        </div>

        <div class="thumb me-4">
          <img th:src="${trip.tripPathNm}" alt="관광지 이미지" loading="lazy">
        </div>

        <div class="flex-grow-1">
          <h4 class="fw-bold mb-1" th:text="${trip.tripNm}">관광지명</h4>
          <p class="text-muted mb-0 text-truncate" style="max-width: 400px;" th:text="${trip.tripAddr}">주소</p>
        </div>

        <div class="views-box text-muted">
          <i data-lucide="eye" class="me-1" style="width: 18px;"></i>
          <span th:text="${trip.tripInqCnt != null ? #numbers.formatInteger(trip.tripInqCnt, 1, 'COMMA') : 0}">0</span>
        </div>
      </a>
    </div>
  </section>

  <!-- 테마 배너 -->
  <section class="container py-5">
    <div class="theme-banner-container">
      <div class="theme-banner-gradient"></div>
      <div class="theme-banner-content">
        <div class="theme-banner-icon">
          <i data-lucide="sparkles"></i>
        </div>
        <h3 class="theme-banner-title">
          어디로 갈지 고민이신가요?
        </h3>
        <p class="theme-banner-desc">
          해봄트립 AI가 당신의 취향에 딱 맞는 여행지를 추천해 드립니다
        </p>
        <button class="theme-banner-btn">
          <span>나만의 맞춤 여행지 찾기</span>
          <i data-lucide="arrow-right"></i>
        </button>
      </div>
      <div class="theme-banner-decoration">
        <div class="decoration-circle circle-1"></div>
        <div class="decoration-circle circle-2"></div>
        <div class="decoration-circle circle-3"></div>
      </div>
    </div>
  </section>

  <!-- 지역별 여행지 랜덤 추천 -->
  <section class="container py-5">
    <h2 class="fw-bold mb-4 d-flex align-items-center gap-2">
      <i data-lucide="map-pin" class="text-primary"></i>
      지역별 여행지 추천
    </h2>

    <div class="slider-container position-relative">
      <div class="swiper regionSwiper">
        <div class="swiper-wrapper">
          <div th:each="trip : ${randomRegionList}" class="swiper-slide">
            <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden hover-lift">

              <a th:href="@{/trip/trip_view(tripContsId=${trip.tripContsId})}">
                <img th:src="${trip.tripPathNm}" class="card-img-top"
                     style="height: 250px; object-fit: cover;"
                     th:alt="${trip.tripNm}" loading="lazy">
              </a>

              <div class="card-body">
                <h5 class="fw-bold mb-2 text-truncate">
                  <a th:href="@{/trip/trip_view(tripContsId=${trip.tripContsId})}"
                     class="text-decoration-none text-dark"
                     th:text="${trip.tripNm}">관광지명</a>
                </h5>
                <p class="card-text text-muted small mb-3 text-truncate" th:text="${trip.tripAddr}">주소</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="swiper-pagination custom-pagination"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>
  </section>

  <section class="container-fluid py-4 weather-section">
    <div class="weather-inner">
      <h2 class="fw-bold mb-2 d-flex align-items-center justify-content-center gap-2">
        <i data-lucide="thermometer-sun" class="text-warning"></i>
        오늘의 날씨 BEST 3
      </h2>
      <p class="text-muted mb-5">지금 여행하기 가장 좋은 지역이에요.</p>
      <div class="row g-4 justify-content-center" id="weatherList"></div>
    </div>
  </section>

  <template id="weather-card-template">
    <div class="col-md-3 weather-card-wrapper">
      <div class="card shadow-lg border-0 rounded-4 weather-link-card" style="cursor: pointer;">
        <div class="card-body text-center p-1">
          <div class="medal-slot mb-2"></div>
          <h3 class="region-name fw-bold mb-3"></h3>
          <div class="mb-3">
            <i class="weather-icon text-warning"></i>
          </div>
          <div class="weather-info-grid">
            <div class="info-item">
              <span class="label">기온</span>
              <span class="value temp-val"></span>
            </div>
            <div class="info-item">
              <span class="label">강수확률</span>
              <span class="value rain-val"></span>
            </div>
            <div class="info-item">
              <span class="label">풍속</span>
              <span class="value wind-val"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>
</main>

<!-- Footer -->
<div th:replace="~{main/footer :: footer}"></div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../javascript/header.js"></script>
<script src="../javascript/main.js"></script>

<!-- AI Widget Script -->
<script src="../javascript/ai_widget.js"></script>
</body>
</html>
