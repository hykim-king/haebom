<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>해봄트립</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

     <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />


    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/ai_widget.css}" />

  </head>

  <body>
    
    <!-- Header -->
    <div th:replace="~{main/header :: header}"></div>

    <!-- Main -->
    <main class="main">
      <!-- Hero -->
      <section class="hero">
        <div id="hero-slider"></div>
        <div class="hero-overlay"></div>

        <div class="hero-inner">
          <span class="hero-badge">새로운 여행의 시작, 해봄트립</span>

          <h1 class="hero-title">
            설렘 가득한 여행을<br />
            <strong>해봄!</strong>
          </h1>

          <p class="hero-desc">
            사계절 언제나 아름다운 대한민국,<br />
            당신만의 특별한 여행을 시작하세요.
          </p>

          <div class="hero-search">
            <input type="text" placeholder="어디로 떠나고 싶으신가요?" />
            <button class="hero-btn">검색</button>
          </div>
        </div>
      </section>

      <!-- 테마 배너 -->
      <section class="container py-4">
        <div class="theme-banner position-relative overflow-hidden rounded-4 shadow-lg mb-5">
          <div class="overlay-image"></div>
          <div class="card-body p-5 text-center position-relative" style="z-index: 2;">
            <h2 class="display-6 fw-bold mb-3">어디로 갈지 고민이신가요?</h2>
            <p class="lead mb-4">해봄트립 AI가 당신의 취향에 딱 맞는 여행지를 추천해 드립니다.</p>
            <a th:href="@{/ai/recommend.do}" class="btn btn-light rounded-pill px-4 py-2 fw-bold text-btn mt-3 mt-md-0">나만의 맞춤 여행지 찾기</a>
          </div>
        </div>
      </section>

      <!-- 인기 관광지 섹션 -->
      <section class="container py-4">

        <div id="popularList" class="list-group">
          <h2 class="fw-bold mb-4 d-flex align-items-center gap-2">
            <i data-lucide="trending-up" class="text-primary"></i>
            실시간 인기 관광지
          </h2>
          <a th:each="trip, iterStat : ${popularList}"
             th:href="@{/trip/doSelectOne.do(tripContsId=${trip.tripContsId})}"
             class="list-group-item popular-item d-flex align-items-center shadow-sm rounded mb-4 border-0">

            <div class="me-4 text-center" style="width: 50px;">
              <span class="fs-1" th:text="${iterStat.count == 1 ? '🥇' : (iterStat.count == 2 ? '🥈' : '🥉')}"></span>
            </div>

            <div class="thumb me-4">
              <img th:src="${trip.tripPathNm}" alt="관광지 이미지" style="width: 100px; height: 100px; object-fit: cover; border-radius: 10px;">
            </div>

            <div class="flex-grow-1">
              <h4 class="fw-bold mb-1" th:text="${trip.tripNm}">관광지명</h4>
              <p class="text-muted mb-0" th:text="${trip.tripAddr}">주소</p>
            </div>

            <div class="views-box d-flex align-items-center gap-1">
              <i data-lucide="eye" style="width: 18px;"></i>
              <span th:text="${trip.tripInqCnt != null ? #numbers.formatInteger(trip.tripInqCnt, 1, 'COMMA') : 0}">0</span>
            </div>
          </a>
        </div>
      </section>

       <!-- 지역 슬라이더 (Regional Slider - Swiper) -->
      <section class="container py-4">
        <h2 class="fw-bold mb-4 d-flex align-items-center gap-2">
          <i data-lucide="map-pin" class="text-primary"></i>
          지역별 여행지 추천
        </h2>

        <div class="swiper regionSwiper position-relative overflow-hidden" style="min-height: 400px;">
          <div class="swiper-wrapper">
            <div th:each="region : ${randomRegionList}" class="swiper-slide p-2">
              <div class="region-card card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="position-relative">
                  <img th:src="${region.tripPathNm}" class="card-img-top" style="height: 250px; object-fit: cover;" alt="추천 이미지" onerror="this.style.display='none';">
                  <span class="position-absolute top-0 start-0 m-3">지역</span>
                </div>
                <div class="card-body p-4 text-start">
                  <h5 class="fw-bold mb-2 text-truncate" th:text="${region.tripNm}">관광지명</h5>
                  <p class="card-text text-muted small mb-3 text-truncate" th:text="${region.tripAddr}">주소</p>
                  <a th:href="@{/trip/doSelectOne.do(tripContsId=${region.tripContsId})}"
                     class="btn btn-outline-dark w-100 rounded-pill">상세보기</a>
                </div>
              </div>
            </div>
          </div>

          <div class="swiper-pagination mt-4"></div>
        </div>
      </section>

      <!-- 날씨 BEST -->
      <section class="container-fluid py-6 weather-section">
        <div class="weather-inner text-center">
          <h2
            class="fw-bold mb-1 d-flex align-items-center justify-content-center gap-2"
            style="font-size: 35px"
          >
            <i data-lucide="sun" class="text-warning"></i>
            오늘의 날씨 BEST 3
          </h2>
          <p class="text-muted mb-4" style="font-size: 20px">
            지금 여행하기 가장 좋은 지역이에요.
          </p>

          <div class="row g-5 justify-content-center" id="weatherList"></div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <div th:replace="~{main/footer :: footer}"></div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../javascript/header.js"></script>
    <script src="../javascript/main.js"></script>

    <!-- AI Widget Script -->
    <script src="../javascript/ai_widget.js"></script>

  </body>
</html>
