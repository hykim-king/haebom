<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>해봄트립 - 의료가이드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/header.css" rel="stylesheet">
    <link href="../css/footer.css" rel="stylesheet">
    <link href="../css/medical_guidedetail.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div th:replace="~{main/header :: header}"></div>

<main class="container">
    <div class="breadcrumb-nav">
        <a th:href="@{/medical}"><i data-lucide="arrow-left" size="18"></i> 목록</a>
        <span>|</span>
        <span th:text="${hospital.hpNm}">병원명</span>
    </div>

    <section class="hero-card">
        <div>
            <span class="hero-badge">병원</span>
            <h1 class="hero-title" th:text="${hospital.hpNm}">병원명</h1>
        </div>
        <div class="hero-icon-circle">
            <i data-lucide="stethoscope" size="32"></i>
        </div>
    </section>

    <div class="detail-grid">

        <section class="detail-box">
            <h2 class="detail-h2"><i data-lucide="map-pin" size="22"></i> 위치 안내</h2>
            <div id="trip-mini-map"
                 style="width:100%; height:350px; border-radius:16px; overflow:hidden; background:#f3f4f6;"></div>
        </section>

        <section class="detail-box">
            <h2 class="box-title">기본 정보</h2>
            <div class="info-list">

                <div class="info-item">
                    <div class="info-icon"><i data-lucide="map-pin" size="20"></i></div>
                    <div class="info-content">
                        <label>주소</label>
                        <span class="detail-addr" th:text="${hospital.hpAddr}">주소</span>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon"><i data-lucide="clock" size="20"></i></div>
                    <div class="info-content">
                        <label>운영시간</label>
                        <span id="detail-time">09:00 - 18:00</span>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon"><i data-lucide="calendar" size="20"></i></div>
                    <div class="info-content">
                        <label>주말 운영</label>
                        <span th:text="${hospital.hpWkndOpenYn == 'Y' ? '주말 진료 가능' : '주말 휴진'}">주말 운영 여부</span>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon"><i data-lucide="phone" size="20"></i></div>
                    <div class="info-content">
                        <label>대표 전화</label>
                        <span id="detail-phone1" th:text="${hospital.hpTelno1}">전화번호</span>
                    </div>
                </div>

                <div class="info-item" th:if="${hospital.hpEmrmYn == '1'}">
                    <div class="info-icon"><i data-lucide="siren" size="20"></i></div>
                    <div class="info-content">
                        <label>응급실</label>
                        <span id="detail-phone2" th:text="${hospital.hpTelno2}">응급실 전화번호</span>
                        <div class="emergency-tag">응급실 운영중</div>
                    </div>
                </div>

            </div>
        </section>

    </div>

    <div class="btn-container">
        <a class="btn-back-list" th:href="@{/medical}">
            <i data-lucide="layout-list" size="20"></i>
            목록으로 돌아가기
        </a>
    </div>
</main>

<div th:replace="~{main/footer :: footer}"></div>

<script src="../javascript/medical.js"></script>

<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f660768a1b637b8b3e739404a972f5e8&autoload=false"
        type="text/javascript"></script>
<script th:inline="javascript">
    const opTm = /*[[${hospital.hpOpTm}]]*/ '';
    const endTm = /*[[${hospital.hpEndTm}]]*/ '';

    window.onload = () => {
        lucide.createIcons();
        document.getElementById('detail-time').textContent = formatTime(opTm) + ' - ' + formatTime(endTm);
        const phone1 = document.getElementById('detail-phone1');
        if (phone1) phone1.textContent = formatPhone(phone1.textContent);
        const phone2 = document.getElementById('detail-phone2');
        if (phone2) phone2.textContent = formatPhone(phone2.textContent);
        document.querySelectorAll('.detail-addr').forEach(el => {
            el.textContent = el.textContent.replace(/,\s*$/, '');
        });

    };

    const hpLat = /*[[${hospital.hpLat}]]*/ 0;
    const hpLot = /*[[${hospital.hpLot}]]*/ 0;
    const hpNm = /*[[${hospital.hpNm}]]*/ '';

    kakao.maps.load(() => {
        if (!hpLat || !hpLot) return;

        const container = document.getElementById('trip-mini-map');
        const map = new kakao.maps.Map(container, {
            center: new kakao.maps.LatLng(hpLat, hpLot),
            level: 3
        });

        const marker = new kakao.maps.Marker({
            position: new kakao.maps.LatLng(hpLat, hpLot),
            map: map
        });

        const content = `
            <div style="
                padding: 7px 14px;
                background-color: white;
                border: 1px solid #ddd;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.12);
                font-size: 13px;
                font-weight: bold;
                width: max-content;
                text-align: center;
                white-space: nowrap;
                position: relative;
                margin-bottom: 20px;
            ">
                <a href="https://map.kakao.com/link/search/${encodeURIComponent(hpNm || dsNm)}"
                   target="_blank"
                   style="text-decoration: none; color: #222; display: block;">
                    ${hpNm || dsNm}
                </a>
                <div style="
                    position: absolute;
                    width: 10px;
                    height: 10px;
                    background: white;
                    border-right: 1px solid #ddd;
                    border-bottom: 1px solid #ddd;
                    bottom: -6px;
                    left: 50%;
                    transform: translateX(-50%) rotate(45deg);
                "></div>
            </div>`;

        new kakao.maps.CustomOverlay({
            position: new kakao.maps.LatLng(hpLat, hpLot),
            content: content,
            xAnchor: 0.5,
            yAnchor: 1.45
        }).setMap(map);
    });
</script>
</body>
</html>
