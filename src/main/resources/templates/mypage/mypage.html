<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>


    <title>해봄트립 - 마이페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/myPage.css}">
</head>
<body>
    <div th:replace="~{main/header :: header}"></div>

    <div class="container py-5">
        <div class="row g-4">
            <div class="col-lg-3">
                <div class="custom-card p-4 text-center mb-4">
                    <img id="sidebar-img" src="/images/common/default-profile.png" class="profile-img mb-3">
                    <h5 class="fw-bold mb-1" id="sidebar-nickname">로딩 중...</h5>
                    <p class="text-muted small mb-3" id="sidebar-email">@example.com</p>
                    <div class="text-start mb-4">
                        <small class="text-muted fw-bold">나의 해시태그</small>
                        <div id="hashtag-container" class="d-flex flex-wrap gap-1 mt-2"></div>
                    </div>
                    <button class="btn btn-outline-warning w-100 rounded-pill py-2" style="color:#ff9f43; border-color:#ff9f43;">문의하기</button>
                </div>
                <div class="custom-card p-2">
                    <div class="menu-item active" data-menu="info"><span><i data-lucide="user" class="me-2"></i> 내 정보</span> <i data-lucide="chevron-right"></i></div>
                    <div class="menu-item" data-menu="wish"><span><i data-lucide="heart" class="me-2"></i> 찜 목록 (<span id="sidebar-wish-count">0</span>)</span> <i data-lucide="chevron-right"></i></div>
                    <div class="menu-item" data-menu="completed"><span><i data-lucide="map-pin" class="me-2"></i> 여행 완료</span> <i data-lucide="chevron-right"></i></div>
                </div>
            </div>

            <div class="col-lg-9">
                <div id="content-info" class="content-pane active">
                    <div class="content-header"><span><i data-lucide="user"></i> 내 정보 관리</span></div>
                    <div class="content-body">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="info-box">
                                    <div><span class="info-label">이름</span><span id="info-name" class="info-value">-</span></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="info-box">
                                    <div><span class="info-label">연락처</span><span id="info-phone" class="info-value">-</span></div>
                                </div>
                            </div>
                        </div>

                        <div class="info-box">
                            <div><span class="info-label">닉네임</span><span id="display-nickname" class="info-value">로딩 중...</span></div>
                            <button class="action-btn" id="btn-nick-edit-toggle">변경하기</button>
                        </div>
                        <div id="nick-edit-fields" class="d-none mb-3 p-3 border rounded bg-light">
                            <div class="input-group">
                                <input type="text" id="new-nickname" class="form-control" placeholder="새 닉네임 입력">
                                <button class="btn btn-dark" id="btn-nick-save">저장</button>
                            </div>
                        </div>

                        <div class="info-box">
                            <div><span class="info-label">비밀번호</span><span class="info-value">********</span></div>
                            <button class="action-btn" id="btn-pw-edit-toggle">변경하기</button>
                        </div>
                        <div id="pw-edit-fields" class="d-none mb-3 p-3 border rounded bg-light">
                            <input type="password" id="current-pw" class="form-control mb-2" placeholder="현재 비밀번호">
                            <input type="password" id="new-pw" class="form-control mb-2" placeholder="새 비밀번호">
                            <input type="password" id="confirm-pw" class="form-control mb-2" placeholder="새 비밀번호 확인">
                            <div class="text-end"><button class="btn btn-dark btn-sm" id="btn-pw-save">비밀번호 저장</button></div>
                        </div>

                        <div class="info-box">
                            <div><span class="info-label">주소지 관리</span><span id="current-addr-text" class="text-muted small">주소를 등록해 주세요.</span></div>
                            <button class="action-btn" id="btn-addr-edit-toggle">수정하기</button>
                        </div>
                        <div id="addr-edit-fields" class="d-none mb-3 p-3 border rounded bg-light">
                            <div class="row g-2">
                                <div class="col-8"><input type="text" id="postcode" class="form-control" placeholder="우편번호" readonly></div>
                                <div class="col-4"><button class="btn btn-outline-secondary w-100" onclick="execPostCode()">검색</button></div>
                                <div class="col-12"><input type="text" id="address-base" class="form-control" placeholder="기본 주소" readonly></div>
                                <div class="col-12"><input type="text" id="address-detail" class="form-control" placeholder="상세 주소"></div>
                                <div class="col-12 text-end"><button class="btn btn-dark btn-sm" id="btn-addr-save">주소 저장</button></div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="fw-bold">관심 해시태그</span>
                                <button class="btn btn-sm text-muted" id="btn-tag-edit-toggle"><i data-lucide="edit-3" size="14"></i> 수정하기</button>
                            </div>
                            <div id="tag-editor-container" class="d-none p-3 border rounded-4 bg-white mb-3 shadow-sm">
                                <div id="theme-list-wrapper" class="d-flex flex-wrap mb-3"></div>
                                <div class="text-end"><button class="btn btn-warning btn-sm text-white px-4" onclick="saveTags()">태그 저장</button></div>
                            </div>
                            <div class="p-4 bg-light rounded-4 text-muted" id="selected-hashtags-display">태그를 불러오는 중...</div>
                        </div>
                    </div>
                </div>

                <div id="content-wish" class="content-pane" style="display:none;">
                    <div class="content-header">
                        <span><i data-lucide="heart"></i> 찜한 여행지 <span id="wish-count-badge">0</span></span>
                    </div>
                    <div class="content-body">
                        <div class="row g-4" id="wish-items-row"></div>
                        <div id="wish-pagination" class="d-flex justify-content-center mt-4"></div>
                    </div>
                </div>

                <div id="content-completed" class="content-pane" style="display:none;">
                    <div class="content-header"><span><i data-lucide="map-pin"></i> 여행 완료</span></div>
                    <div class="content-body">
                        <div class="row g-4" id="completed-items-row"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <div th:replace="~{main/footer :: footer}"></div>
    <script th:src="@{/javascript/myPage.js}"></script>
</body>
</html>
