<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해봄트립 - 공지사항</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/notice.css}">
</head>
<body>

<div th:replace="~{main/header :: header}"></div>

<main class="container pb-5">
    <section class="page-title-section">
        <h2 class="text-dark mb-2">공지사항</h2>
        <p class="text-secondary fs-5">
            해봄트립의 소중한 소식들을 확인해보세요.
        </p>
    </section>

    <form method="get" th:action="@{/notice}" id="searchForm">
        <!-- pageNo, pageSize는 숨겨서 함께 전송 -->
        <input type="hidden" name="pageNo"   value="1"  />
        <input type="hidden" name="pageSize" value="10" />

        <div class="card search-card mb-4">
            <div class="card-body p-4">
                <div class="row g-3 align-items-center">
                    <div class="col-md-6">
                        <p class="m-0 text-muted">
                            총
                            <span id="total-count" class="text-primary fw-bold" th:text="${list.size()}">0</span>건의
                            안내가 있습니다.
                        </p>
                    </div>
                    <div class="col-md-6">
                        <div class="d-flex gap-2">
                            <!-- 검색 구분 선택 (제목 / 내용) -->
                            <select name="searchDiv" class="form-select" style="width: 110px; flex-shrink: 0;">
                                <option value="10"
                                        th:selected="${searchVO.searchDiv == null or searchVO.searchDiv == '10'}">
                                    제목
                                </option>
                                <option value="20"
                                        th:selected="${searchVO.searchDiv == '20'}">
                                    내용
                                </option>
                            </select>
                            <div class="flex-grow-1 search-input-group">
                                <!-- 검색 후 입력창에 검색어 유지 -->
                                <input
                                        name="searchWord"
                                        class="form-control"
                                        type="text"
                                        placeholder="검색어를 입력하세요."
                                        th:value="${searchVO.searchWord}"
                                />
                            </div>
                            <!-- type="submit" 으로 form을 바로 전송 -->
                            <button
                                    type="submit"
                                    id="search-button"
                                    class="btn px-4 fw-bold rounded-3"
                                    style="background-color: #F97316; border-color: #F97316; color: #ffffff;"
                            >
                                검색
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <div class="d-flex justify-content-end mb-3" th:if="${userMngrYn == 'Y'}">
        <a th:href="@{/notice/noticeWrite(ntcNo=0)}"
           class="btn px-4 fw-bold rounded-3 shadow-sm"
           style="background-color: #F97316; border-color: #F97316; color: #ffffff;">
            <i data-lucide="pencil" class="me-1" style="width: 18px;"></i>관리자 공지 등록
        </a>
    </div>

    <div class="card notice-card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table text-center align-middle">
                    <thead>
                    <tr>
                        <th style="width: 100px">번호</th>
                        <th class="text-start">제목</th>
                        <th style="width: 140px">작성자</th>
                        <th style="width: 140px">작성일</th>
                    </tr>
                    </thead>
                    <tbody id="notice-tbody">
                    <tr th:each="vo : ${list}"
                        th:onclick="|location.href='@{/notice/noticeDetail(ntcNo=${vo.ntcNo})}'|"
                        style="cursor: pointer;">
                        <td th:text="${vo.ntcNo}">1</td>
                        <td class="text-start">
                            <a th:href="@{/notice/noticeDetail(ntcNo=${vo.ntcNo})}"
                               th:text="${vo.ntcTtl}"
                               class="text-decoration-none text-dark"
                               onclick="event.stopPropagation();">
                                공지사항 제목
                            </a>
                        </td>
                        <td th:text="${vo.userVO != null ? vo.userVO.userNm : '관리자'}">작성자</td>
                        <td th:text="${vo.ntcReg}">작성일</td>
                    </tr>
                    <!-- 검색 결과 없을 때 -->
                    <tr th:if="${list.isEmpty()}">
                        <td colspan="4" class="text-muted py-4">검색 결과가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <nav class="mt-5">
        <ul class="pagination justify-content-center">

            <!-- 이전 버튼: 1페이지면 비활성화 -->
            <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/notice(pageNo=${currentPage - 1}, pageSize=10, searchDiv=${searchVO.searchDiv}, searchWord=${searchVO.searchWord})}"
                ><i data-lucide="chevron-left" size="20"></i></a>
            </li>

            <!-- 페이지 번호 목록 -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:text="${i}"
                   th:href="@{/notice(pageNo=${i}, pageSize=10, searchDiv=${searchVO.searchDiv}, searchWord=${searchVO.searchWord})}">
                </a>
            </li>

            <!-- 다음 버튼: 마지막 페이지면 비활성화 -->
            <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/notice(pageNo=${currentPage + 1}, pageSize=10, searchDiv=${searchVO.searchDiv}, searchWord=${searchVO.searchWord})}"
                ><i data-lucide="chevron-right" size="20"></i></a>
            </li>

        </ul>
    </nav>
</main>

<div th:replace="~{main/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    lucide.createIcons();
</script>
<script src="../javascript/main_Org.js"></script>
<script src="../javascript/header.js"></script>
</body>
</html>
