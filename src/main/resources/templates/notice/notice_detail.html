<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쑥쑥 - 공지사항 상세</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="../css/header.css"/>
    <link rel="stylesheet" href="../css/footer.css"/>
    <link rel="stylesheet" th:href="@{../css/notice_detail.css(v=20260226)}"><!-- Header -->
</head>
<div th:replace="~{main/header :: header}"></div>

<!-- Notice Detail View -->
<div class="notice-container">
    <article class="notice-card">
        <!-- Header Section -->
        <div class="notice-header">
            <span class="notice-category">공지사항</span>
            <h1 class="notice-title" th:text="${outVO.ntcTtl}">제목</h1>
            <div class="notice-info">
                <div class="info-left">
                    <span>작성자: <b th:text="${outVO.userVO != null ? outVO.userVO.userMngrYn:'관리자'}"></b></span>
                    <span>날짜: <span th:text="${outVO.ntcReg}">날짜</span></span>
                </div>
            </div>
        </div>

        <!-- Content Section (The 'Text Area' from screenshot) -->
        <div class="notice-body">
            <div th:utext="${outVO.ntcCn}">내용을 넣어주세요</div>
        </div>

        <!-- Footer Actions -->
        <div class="notice-footer">
            <input type="hidden" id="ntcNo" th:value="${outVO.ntcNo}">
            <a th:href="@{/notice/notice}" class="btn-list">목록으로</a>
            <div class="action-group">
                <button type="button" class="btn-edit">수정</button>
                <button type="button" class="btn-edit btn-delete" style="color: #ef4444; border-color: #fee2e2;">삭제</button>
            </div>
        </div>
    </article>

</div>

<!-- Footer -->
<div th:replace="~{main/footer :: footer}"></div>

<!-- JS -->
<script src="../javascript/header_Org.js"></script>
<script src="../javascript/notice_detail.js"></script>


</body>
</html>
