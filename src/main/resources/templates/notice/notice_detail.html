<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:padding="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쑥쑥 - 공지사항 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/header.css"/>
    <link rel="stylesheet" href="../css/footer.css"/>
    <link rel="stylesheet" th:href="@{../css/notice_detail.css(v=20260226)}">
</head>
<body>
<div th:replace="~{main/header :: header}"></div>

<div class="notice-container">
    <article class="notice-card">

        <div class="notice-header">
            <span class="notice-category">공지사항</span>
            <h1 class="notice-title" th:text="${outVO.ntcTtl}">제목</h1>
            <div class="notice-info">
                <div class="info-left">
                    <!-- [수정] userMngrYn(Y/N) → userNm(실제 이름) 표시 -->
                    <span>작성자: <b th:text="${outVO.userVO != null ? outVO.userVO.userNm : '관리자'}"></b></span>
                    <span>날짜: <span th:text="${outVO.ntcReg}">날짜</span></span>
                </div>
            </div>
        </div>

        <div class="notice-body">
            <!-- 글 내용 -->
            <div th:utext="${outVO.ntcCn}">내용을 넣어주세요</div>

            <!-- ── 이미지 파일: 글 박스 안에 미리보기 + 다운로드 링크 함께 표시 ── -->
            <div th:if="${outVO.fileList != null and !outVO.fileList.isEmpty()}"
                 style="margin-top: 1.5rem;">
                <th:block th:each="f : ${outVO.fileList}">
                    <div th:if="${f.fileClsf == 'img'}" style="margin-bottom: 1.2rem;">
                        <!-- 이미지 미리보기 -->
                        <img th:src="@{/notice/download(filePathNm=${f.filePathNm}, fileNm=${f.fileNm})}"
                             th:alt="${f.fileNm}"
                             style="max-width: 100%; border-radius: 8px; display: block;" />
                    </div>
                </th:block>
            </div>
        </div>

        <!-- ── 첨부파일 전체 목록 (이미지 포함 모든 파일 다운로드 링크) ── -->
        <div class="notice-attachment"
             th:if="${outVO.fileList != null and !outVO.fileList.isEmpty()}"
             style="padding: 0 2rem;">
            <hr style="margin-bottom: 8px;" />
            <p style="font-weight:600; font-size:0.9rem; color:#555; margin-bottom:6px;">📎 첨부파일</p>
            <ul style="list-style:none; padding:0; margin:0;">
                <li th:each="f : ${outVO.fileList}" style="margin-bottom:4px;">
                    <a th:href="@{/notice/download(filePathNm=${f.filePathNm}, fileNm=${f.fileNm})}"
                       th:text="${f.fileNm}"
                       style="color:#F97316; font-size:0.9rem; text-decoration:none;">
                        파일명
                    </a>
                </li>
            </ul>
        </div>

        <div class="notice-footer">
            <input type="hidden" id="ntcNo" th:value="${outVO.ntcNo}">
            <a th:href="@{/notice/notice}" class="btn-list">목록으로</a>

            <!-- 관리자만 수정/삭제 표시 -->
            <div class="action-group" th:if="${userMngrYn == 'Y'}">
                <button type="button" class="btn-edit">수정</button>
                <button type="button" class="btn-edit btn-delete"
                        style="color:#ef4444; border-color:#fee2e2;">삭제</button>
            </div>
        </div>

    </article>
</div>

<div th:replace="~{main/footer :: footer}"></div>
<script src="../javascript/header_Org.js"></script>
<script src="../javascript/notice_detail.js"></script>
</body>
</html>
