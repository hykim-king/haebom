<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쑥쑥 - 글쓰기</title>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/notice_write.css}">
</head>
<body>
<div th:replace="~{main/header :: header}"></div>

<div class="write-container">

    <form id="writeForm" enctype="multipart/form-data">
        <input type="hidden" id="ntcNo" name="ntcNo" th:value="${noticeVO.ntcNo}">

        <div class="write-card">
            <div class="write-header">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <div class="important-check" style="font-size:14px; color:#666;">
                        <input type="checkbox" id="isImportant" style="cursor:pointer;">
                        <label for="isImportant" style="cursor:pointer; font-weight:500;">📌 상단에 고정하기</label>
                    </div>
                </div>
                <input type="text" class="write-title-input"
                       placeholder="제목을 입력해 주세요"
                       id="postTitle" name="ntcTtl"
                       th:value="${noticeVO.ntcTtl}" required>
            </div>

            <div class="write-body">
                <textarea class="content-textarea"
                          placeholder="여기에 내용을 자유롭게 작성해 보세요..."
                          id="postContent" name="ntcCn"
                          th:text="${noticeVO.ntcCn}" required></textarea>
            </div>

            <!-- 파일 첨부 영역 -->
            <div class="attachment-bar">
                <input type="file" id="fileInput" name="files" style="display:none;" multiple>
                <div class="attach-item" id="btn-file" style="cursor:pointer;">
                    📎 파일 첨부하기
                </div>
                <!-- 새로 선택한 파일 목록 표시 -->
                <div id="file-list" class="mt-2" style="font-size:0.9rem; color:#555;"></div>

                <!-- 수정 모드: 기존 첨부파일 목록 표시 -->
                <div th:if="${noticeVO.fileList != null and !noticeVO.fileList.isEmpty()}"
                     style="margin-top:8px; font-size:0.85rem; color:#888;">
                    <div>현재 첨부파일 (새 파일 선택 시 추가됩니다):</div>
                    <div th:each="f : ${noticeVO.fileList}">
                        📎 <span th:text="${f.fileNm}"></span>
                    </div>
                </div>
            </div>

            <div class="write-footer">
                <button type="button" class="btn-cancel" onclick="history.back()">취소</button>
                <button type="button" class="btn-register" id="btn-save"
                        th:text="${noticeVO.ntcNo == 0 ? '등록' : '수정완료'}">등록</button>
            </div>
        </div>
    </form>
</div>

<div th:replace="~{main/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/javascript/header.js}"></script>
<script th:src="@{/javascript/notice_write.js}"></script>
</body>
</html>
