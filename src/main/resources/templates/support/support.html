<style>
    /* support.css */

    :root {
        --primary-color: #f97316;
        --primary-hover: #ea580c;
        --bg-light: #f8f9fa;
        --text-dark: #2c3e50;
        --text-muted: #6c757d;
        --card-radius: 16px;
        --transition-speed: 0.3s;
    }

    /* 화면 밑 흰색 배경 방지를 위해 html에도 배경색 적용 */
    html {
        background-color: var(--bg-light);
        height: 100%;
    }

    body {
        background-color: #fff;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
        font-family: 'Pretendard', -apple-system, sans-serif;
        color: var(--text-dark);
    }

    main {
        flex: 1;
    }

    /* Tab Navigation */
    .tab-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 40px 0;
    }

    .tab-btn {
        padding: 12px 40px;
        border-radius: 12px;
        border: 2px solid var(--primary-color);
        background: white;
        color: var(--primary-color);
        font-weight: bold;
        transition: all var(--transition-speed) ease;
        cursor: pointer;
        min-width: 180px;
    }

    .tab-btn.active {
        background: var(--primary-color);
        color: white;
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2);
    }

    /* Content Sections */
    .content-section { display: none; }
    .content-section.active { display: block; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* FAQ Accordion Item */
    .faq-item {
        background: white;
        border-radius: 12px;
        margin-bottom: 15px;
        border: 1px solid #eef2f7;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .faq-header {
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .faq-header:hover {
        background-color: rgba(249, 115, 22, 0.03);
        color: var(--primary-color);
        padding-left: 25px;
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.08);
    }

    .faq-body {
        padding: 0 20px;
        max-height: 0;
        overflow: hidden;
        transition: all var(--transition-speed) ease;
        background: #fafbfc;
        color: var(--text-muted);
    }

    .faq-item.open .faq-body {
        padding: 20px;
        max-height: 300px;
        border-top: 1px solid #eee;
    }

    .faq-item.open .chevron { transform: rotate(180deg); color: var(--primary-color); }
    .chevron { transition: transform var(--transition-speed) ease; }

    /* Inquiry Board */
    .board-card {
        background: white;
        border-radius: var(--card-radius);
        padding: 25px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }

    .inquiry-item {
        padding: 18px;
        border-bottom: 1px solid #f1f5f9;
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-decoration: none;
        color: inherit;
        transition: background 0.2s;
        border-radius: 10px;
    }

    .inquiry-item:last-child { border-bottom: none; }
    .inquiry-item:hover { background: rgba(249, 115, 22, 0.05); }

    /* 📌 글쓰기 버튼 컨테이너 (오른쪽 정렬 및 간격 수정) */
    .write-btn-container {
        text-align: right;
        margin-top: 32px; /* 라인과 버튼 사이의 간격 */
        margin-bottom: 8px;
    }

    /* 📌 글쓰기 버튼 스타일 (주황색 유지 및 그림자 강화) */
    .btn-primary {
        background-color: var(--primary-color) !important;
        border: none !important;
        color: white !important;
        padding: 12px 32px !important;
        border-radius: 14px !important;
        font-weight: 700 !important;
        transition: all 0.2s ease-in-out !important;
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.15) !important;
    }

    .btn-primary:hover {
        background-color: var(--primary-hover) !important;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(249, 115, 22, 0.25) !important;
    }

    .btn-primary:active {
        transform: translateY(0);
    }

    /* 답변완료 배지 */
    .badge-done {
        background-color: rgba(249, 115, 22, 0.1) !important;
        color: var(--primary-hover) !important;
        border: 1px solid rgba(249, 115, 22, 0.2) !important;
        font-weight: 600;
        position: relative;
        overflow: hidden;
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .badge-done::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.6), transparent);
        animation: shimmer 3s infinite;
    }

    @keyframes popIn {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    @keyframes shimmer {
        0% { left: -100%; }
        30% { left: 100%; }
        100% { left: 100%; }
    }

    /* 처리중 배지 */
    .badge-processing {
        background-color: #f1f5f9 !important;
        color: #64748b !important;
        border: 1px solid #e2e8f0 !important;
    }
    /* ===== Header Layout ===== */
    .header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid #fde68a;

    }

    .header-inner {
        max-width: 2000px;
        margin: 0 auto;
        padding: 0 16px;
        height: 100px;   /* 여기서 조절 */
        display: flex;
        align-items: center;
        justify-content: space-between;
    }


    /* ===== Logo ===== */
    .logo {
        font-size: 30px;
        font-weight: 800;
        color: #f97316;
    }

    /* ===== Navigation ===== */
    .nav-menu {
        display: flex;
        gap: 70px;
        list-style: none;
        margin: 0 !important;
    }

    .nav-menu a {
        color: #5e5b5b;
        font-weight: 500;
        text-decoration: none;
        transition: color 0.2s ease;
        font-size: 20px;
        font-weight: bold;
    }

    .nav-menu a:hover {
        color: #f97316;
    }

    /* ===== Buttons [일단 사용 안하는 중]===== */
    /* .nav-actions {

    .btn {

      background: #ffedd5;

    }

    .btn-primary {
      background: #f97316;
      color: white;
    }

    .btn-primary:hover {
      background: #ea580c;

    /* ===== 로그인/회원가입 ===== */
    .util-menu {
        display: flex;
        align-items: center;
        font-size: 15px;
    }

    .util-menu a {
        text-decoration: none;
        color: #6b7280;
        padding: 0 12px;
        position: relative;
    }

    /* 구분선 */
    .util-menu a:not(:last-child)::after {
        content: "";
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 1px;
        height: 14px;
        background: #d1d5db;
    }

    /* hover */
    .util-menu a:hover {
        color: #f97316;
    }

    /* 마이페이지 강조 */
    .util-menu .highlight {
        color: #f97316;
        font-weight: 600;
    }
    .footer {
        background: #0f172a;
        color: #94a3b8;
        padding: 48px 0;
    }

    .footer-inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 16px;
    }

    .footer-grid {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr;
        gap: 40px;
        margin-bottom: 48px;
    }

    .footer-logo {
        font-size: 24px;
        font-weight: 700;
        color: white;
        margin-bottom: 16px;
    }

    .footer-adress {
        font-size: 14px;
    }

    .footer-text {
        font-size: 18px;
    }

    .footer-title {
        font-weight: 700;
        color: white;
        margin-bottom: 16px;
    }

    /*리스트*/
    .footer-list {
        list-style: none;
        font-size: 14px;
        padding: 0; /* 좌측 기본 여백 제거  */
        margin: 0;  /* 상하단 기본 여백 제거 */
    }

    .footer-list li {
        margin-bottom: 8px;
    }

    .footer-list a {
        color: #94a3b8;
        text-decoration: none;
        transition: color 0.2s ease;
    }

    .footer-list a:hover {
        color: white;
    }

    .footer-newsletter {
        display: flex;
        gap: 8px;
    }


    .footer-newsletter input {
        flex: 1;
        padding: 8px 16px;
        border-radius: 8px;
        border: none;
        background: #1e293b;
        color: white;
    }

    .footer-newsletter button {
        padding: 8px 16px;
        border-radius: 8px;
        background: #f97316;
        color: white;
        border: none;
        cursor: pointer;
    }

    .footer-newsletter button:hover {
        background: #ea580c;
    }

    .footer-copy {

        font-size: 12px;
        width: 100%;  /* 전체 너비 사용 */
    }

<script>
    /* support.js */

    // 1. 데이터 정의
    const FAQ_DATA = [
        { q: "비밀번호를 잊어버렸어요. 어떻게 찾나요?", a: "로그인 화면 하단의 '비밀번호 찾기'를 이용해 주세요. 등록된 이메일로 임시 비밀번호가 발송됩니다." },
        { q: "여행 코스 추천은 어떻게 이용하나요?", a: "AI 기반 추천 시스템을 통해 하니님의 취향에 맞는 맞춤형 여행 코스를 바로 생성해 드립니다." },
        { q: "고객센터 운영 시간은 어떻게 되나요?", a: "평일 09:00 ~ 18:00 (주말 및 공휴일 휴무)입니다. 문의게시판은 24시간 이용 가능합니다." },
        { q: "회원 탈퇴는 어디서 하나요?", a: "마이페이지 > 계정 설정 하단에서 탈퇴 신청이 가능합니다. 탈퇴 시 모든 데이터는 복구가 불가능합니다." }
    ];

    const INQUIRY_DATA = [
        { title: "시스템 점검 관련 문의 드립니다.", date: "2026.02.24", status: "답변완료" },
        { title: "제주도 맛집 데이터 수정 요청", date: "2026.02.23", status: "처리중" },
        { title: "로그인 오류 현상 발생", date: "2026.02.22", status: "답변완료" }
    ];

    // 2. 탭 전환 로직
    function switchTab(tabName) {
        // 모든 섹션 및 버튼 비활성화
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        const sectionId = `${tabName}-section`;
        const btnId = `tab-${tabName}`;

        document.getElementById(sectionId).classList.add('active');
        document.getElementById(btnId).classList.add('active');
    }

    // 3. FAQ 렌더링 및 토글
    function renderFAQ() {
        const faqList = document.getElementById('faq-list');
        if (!faqList) return;

        faqList.innerHTML = FAQ_DATA.map((item, index) => `
        <div class="faq-item" id="faq-${index}">
            <div class="faq-header" onclick="toggleFAQ(${index})">
                <span><i data-lucide="help-circle" size="18" class="me-2 text-warning"></i>${item.q}</span>
                <i data-lucide="chevron-down" class="chevron" size="20"></i>
            </div>
            <div class="faq-body">
                <div class="py-2">${item.a}</div>
            </div>
        </div>
    `).join('');

        if (window.lucide) lucide.createIcons();
    }

    function toggleFAQ(index) {
        const targetItem = document.getElementById(`faq-${index}`);
        const isOpen = targetItem.classList.contains('open');

        // 다른 FAQ 닫기 (원할 경우 주석 처리)
        document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));

        if (!isOpen) {
            targetItem.classList.add('open');
        }
    }

    // 4. 문의게시판 렌더링
    function renderInquiry() {
        const inquiryList = document.getElementById('inquiry-list');
        if (!inquiryList) return;

        inquiryList.innerHTML = INQUIRY_DATA.map(item => {
            const isDone = item.status === '답변완료';
            const badgeClass = isDone ? 'badge-done' : 'badge-processing';

            return `
            <a href="#" class="inquiry-item">
                <div class="d-flex align-items-center gap-3">
                    <span class="badge small ${badgeClass}">${item.status}</span>
                    <span class="inquiry-title">${item.title}</span>
                </div>
                <div class="text-muted small">${item.date}</div>
            </a>
        `;
        }).join('');
    }
</script>
