<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>해봄트립 - 고객지원</title>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/support.css}">
</head>
<body>

<input type="hidden" id="is-admin-check" th:value="${userMngrYn}">

<div th:replace="~{main/header :: header}"></div>

<main class="container pb-5">
    <div class="tab-container">
        <button class="tab-btn active" id="tab-faq" onclick="switchTab('faq')">자주 묻는 질문</button>
        <button class="tab-btn" id="tab-inquiry" onclick="switchTab('inquiry')">문의게시판</button>
    </div>

    <section class="content-section active" id="faq-section">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div id="faq-list"></div>
            </div>
        </div>
    </section>

    <section class="content-section" id="inquiry-section">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="board-card">
                    <div id="inquiry-list">
                        <div class="inquiry-item-container" th:each="item, stat : ${list}">
                            <div class="inquiry-header" th:onclick="|toggleInquiry(${stat.index})|">
                                <div class="d-flex align-items-center gap-3">
                                    <span class="badge small"
                                          th:classappend="${item.supYn == 'Y' ? 'badge-done' : 'badge-pending'}"
                                          th:text="${item.supYn == 'Y' ? '답변완료' : '접수완료'}"></span>
                                    <span class="inquiry-title" th:text="${#strings.abbreviate(item.supCn, 30)}"></span>
                                </div>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="text-muted small" th:text="${item.supReg}"></span>
                                    <i class="chevron-icon" data-lucide="chevron-down"></i>
                                </div>
                            </div>

                            <div class="inquiry-body" th:id="|inquiry-content-${stat.index}|">
                                <div class="content-box">
                                    <p class="question-text">
                                        <strong>Q. 문의내용</strong><br/>
                                        <span th:text="${item.supCn}"></span>
                                    </p>
                                    <hr/>

                                    <div th:if="${item.supYn == 'N'}">
                                        <div class="admin-answer-area admin-only" style="display: none;">
                                            <p class="fw-bold mb-2" style="color:#f">A. 답변 작성 (관리자 전용)</p>
                                            <textarea class="form-control mb-2 text-dark"
                                                      placeholder="답변 내용을 입력해주세요."
                                                      rows="3"
                                                      th:id="|ans-input-${item.supNo}|"
                                                      style="background-color: #fff; border: 1px solid #dee2e6; color: #000 !important;"></textarea>
                                            <div class="text-end">
                                                <button class="btn btn-sm btn-primary px-3"
                                                        th:onclick="|saveAnswer(${item.supNo})|">답변 등록</button>
                                            </div>
                                        </div>

                                        <div class="user-notice text-muted small">
                                            <i data-lucide="clock" size="14" class="me-1"></i>
                                            관리자가 답변을 준비 중입니다.
                                        </div>
                                    </div>

                                    <div th:if="${item.supYn == 'Y'}">
                                        <p class="answer-text">
                                            <strong class="text-primary">A. 관리자 답변</strong><br/>
                                            <span th:text="${item.supAnsCn}"></span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <nav th:if="${totalPages > 0}" class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/support/support(pageNo=${currentPage - 1}, tab='inquiry')}">&laquo;</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link" th:href="@{/support/support(pageNo=${i}, tab='inquiry')}" th:text="${i}"></a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                                <a class="page-link" th:href="@{/support/support(pageNo=${currentPage + 1}, tab='inquiry')}">&raquo;</a>
                            </li>
                        </ul>
                    </nav>

                    <div class="write-btn-container text-end mt-3" th:if="${userMngrYn != 'Y'}">
                        <button class="btn btn-primary px-4 py-2 rounded-3 fw-bold shadow-sm"
                                data-bs-target="#writeModal" data-bs-toggle="modal">
                            <i class="me-1" data-lucide="edit-3" size="18"></i> 문의글 작성
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<div aria-hidden="true" class="modal fade" id="writeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px; border: none;">
            <div class="modal-header" style="border-bottom: none; padding: 25px 25px 10px;">
                <h5 class="modal-title fw-bold">문의하기</h5>
                <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
            </div>
            <div class="modal-body" style="padding: 25px;">
                <textarea class="form-control" id="modalInquiryContent"
                          placeholder="여행에 대해 궁금한 점을 자유롭게 남겨주세요!"
                          rows="5"
                          style="border-radius: 12px; background-color: #f8f9fa; border: none; padding: 15px;"></textarea>
            </div>
            <div class="modal-footer" style="border-top: none; padding: 10px 25px 25px;">
                <button class="btn btn-secondary px-4" data-bs-dismiss="modal" style="border-radius: 12px;" type="button">취소</button>
                <button class="btn btn-primary px-4" onclick="doSaveInquiry()" style="border-radius: 12px;" type="button">등록하기</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{main/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/javascript/support.js}"></script>
<script th:src="@{/javascript/header.js}"></script>
</body>
</html>
