<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="_csrf" th:content="${_csrf?.token}">
    <meta name="_csrf_header" th:content="${_csrf?.headerName}">
    <meta name="referrer" content="no-referrer">

    <title>해봄트립 - 테마</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/Thema.css}">
</head>

<body>
    <div th:replace="~{main/header :: header}"></div>

    <div class="theme-bar-wrapper">
        <div class="theme-inner">
            <div class="category-swiper-wrap">
                <div class="swiper categorySwiper">
                    <div class="swiper-wrapper" id="categoryWrapper"></div>
                </div>
                <div class="swiper-button-prev"><i data-lucide="chevron-left"></i></div>
                <div class="swiper-button-next"><i data-lucide="chevron-right"></i></div>
            </div>
        </div>
    </div>

    <div class="thema-header">
        <div class="header-flex-box">
            <h4 class="thema-sub">🧭테마를 선택해서 나만의 여행을 찾아보세요!🗺️</h4>
            <div class="sort-container">
                <button type="button" id="sortByHits" class="btn-sort">
                    <i class="fa-solid fa-fire me-1"></i> 조회수순
                </button>
            </div>
        </div>
    </div>

    <main class="container">
        <section class="local-section container">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4" id="localTravelGrid">
            </div>

            <button class="btn-more" id="loadMoreLocalBtn">
                테마 여행지 더보기
                <i class="fa-solid fa-chevron-down"></i>
            </button>
        </section>
    </main>

    <div th:replace="~{main/footer :: footer}"></div>


    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script> 
    <script src="https://unpkg.com/lucide@latest"></script>

    <script th:src="@{/javascript/thema.js}"></script>
    <script th:src="@{/javascript/header.js}"></script>

    <script th:inline="javascript">
        /*<![CDATA[*/
        // 1. 객체 전체가 아닌 '존재 여부'만 논리값으로 가져옵니다.
        var isFirstLogin = /*[[${session.user != null}]]*/ false;

        // 2. 디버깅용 출력 (객체 전체 대신 이름이나 ID만 찍어보세요)
        var userName = /*[[${session.user?.userNm}]]*/ '비로그인';
        var userNo = /*[[${session.user?.userNo}]]*/ 'N/A';

        console.log("최종 판정된 로그인 상태:", isFirstLogin);
        console.log("로그인 사용자 이름:", userName);
        console.log("로그인 사용자 번호:", userNo);

        // 전역 객체에 명시적으로 등록 (Thema.js에서 더 잘 찾을 수 있게)
        window.isFirstLogin = isFirstLogin;
        /*]]>*/
    </script>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
