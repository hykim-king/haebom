<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해봄트립 - 여행코스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/trip.css}">

    <style>
        .course-top-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 18px;
            border: 1px solid #d1d5db;
            border-radius: 9999px;
            font-size: 10px;
            color: #6b7280;
            background: #fff;
        }

        /* trip.html의 리스트 간격과 맞춤 */
        .course-list-wrap {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* trip.js 카드 느낌과 맞춤 */
        .course-list-item {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 1.5rem;
            background: #ffffff;
            border: 1px solid #f3f4f6;
            border-radius: 1.5rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .course-list-item:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.05);
        }

        @media (min-width: 768px) {
            .course-list-item {
                flex-direction: row;
                align-items: center;
            }
        }

        .course-thumb-wrap {
            flex-shrink: 0;
            overflow: hidden;
            border-radius: 1rem;
            width: 100%;
            height: 11rem;
            background: #f9fafb;
        }

        @media (min-width: 768px) {
            .course-thumb-wrap {
                width: 16rem;
            }
        }

        .course-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .course-list-item:hover .course-thumb {
            transform: scale(1.08);
        }

        .course-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .course-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .course-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            line-height: 1.35;
            word-break: keep-all;
        }

        .course-region {
            font-size: 0.875rem;
            font-weight: 500;
            color: #9ca3af;
            white-space: nowrap;
            margin-top: 0.25rem;
            flex-shrink: 0;
        }

        .course-tag-badge {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            padding: 0.25rem 0.75rem;
            background: #fff7ed;
            color: #ea580c;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #fed7aa;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }

        .course-tags {
            font-size: 0.75rem;
            color: #9ca3af;
            line-height: 1.6;
            word-break: keep-all;
        }

        .course-meta-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.25rem;
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .course-distance {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            color: #6b7280;
        }

        .course-more {
            color: #6b7280;
            flex-shrink: 0;
            align-self: flex-start;
            margin-top: 0.25rem;
        }

        .course-sort-btn.active {
            color: #111827;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        @media (max-width: 767px) {
            .course-head {
                flex-direction: column;
                gap: 0.25rem;
            }

            .course-title {
                font-size: 1.2rem;
            }

            .course-region {
                white-space: normal;
            }

            .course-more {
                align-self: flex-end;
                margin-top: -0.5rem;
            }

            .course-tag-badge {
                margin-top: 6px;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div th:replace="~{main/header :: header}"></div>

    <div id="main-wrapper">
        <main class="max-w-6xl mx-auto px-4 py-10 w-full">
            <div id="home-view" class="grid grid-cols-1 lg:grid-cols-12 gap-10">

                <!-- 왼쪽 메인 리스트 -->
                <section class="lg:col-span-8 order-2 lg:order-1">
                    <div class="mb-6">
                        <div class="flex items-center gap-2 text-sm text-gray-500 mb-2">
                            <span class="course-top-badge">Easy</span>
                            <span class="font-medium">코스</span>
                        </div>
                        <h2 class="text-[42px] font-black leading-none tracking-tight text-gray-900">
                            #전체
                        </h2>
                    </div>

                    <div class="flex justify-between items-center mb-6 pb-4 border-b-2 border-gray-900">
                        <div class="text-[15px] font-medium text-gray-900">
                            총 <span class="text-orange-500 font-bold">1,046</span>건
                        </div>

                        <div class="flex items-center gap-3 text-sm text-gray-400 font-medium">
                            <button type="button" class="course-sort-btn active">최신순</button>
                            <span>|</span>
                            <button type="button">인기순</button>
                            <i data-lucide="info" size="15" class="text-gray-400"></i>
                        </div>
                    </div>

                    <div class="course-list-wrap">

                        <article class="course-list-item">
                            <div class="course-thumb-wrap">
                                <img class="course-thumb"
                                    src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200&auto=format&fit=crop"
                                    alt="기장 죽성리해안도로">
                            </div>
                            <div class="course-body">
                                <div class="course-head">
                                    <h3 class="course-title">기장 죽성리해안도로, 길 따라 해안풍경이 넉넉하다!</h3>
                                    <span class="course-region">부산 기장군</span>
                                </div>
                                


                            </div>

                        </article>

                        <article class="course-list-item">
                            <div class="course-thumb-wrap">
                                <img class="course-thumb"
                                    src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?q=80&w=1200&auto=format&fit=crop"
                                    alt="익산 여행코스">
                            </div>
                            <div class="course-body">
                                <div class="course-head">
                                    <h3 class="course-title">안전에서 역사까지 익산의 오감 여행코스</h3>
                                    <span class="course-region">전북 익산시</span>
                                </div>
                                


                            </div>

                        </article>

                        <article class="course-list-item">
                            <div class="course-thumb-wrap">
                                <img class="course-thumb"
                                    src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop"
                                    alt="제천 여행코스">
                            </div>
                            <div class="course-body">
                                <div class="course-head">
                                    <h3 class="course-title">안전과 힐링이 함께하는 제천여행코스</h3>
                                    <span class="course-region">충북 제천시</span>
                                </div>
                                


                            </div>

                        </article>

                        <article class="course-list-item">
                            <div class="course-thumb-wrap">
                                <img class="course-thumb"
                                    src="https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=1200&auto=format&fit=crop"
                                    alt="담양 여행코스">
                            </div>
                            <div class="course-body">
                                <div class="course-head">
                                    <h3 class="course-title">안전과 여유, 감동을 함께 누리는 담양여행코스</h3>
                                    <span class="course-region">전남 담양군</span>
                                </div>
                                


                            </div>

                        </article>

                        <article class="course-list-item">
                            <div class="course-thumb-wrap">
                                <img class="course-thumb"
                                    src="https://images.unsplash.com/photo-1512100356356-de1b84283e18?q=80&w=1200&auto=format&fit=crop"
                                    alt="제주올레길">
                            </div>
                            <div class="course-body">
                                <div class="course-head">
                                    <h3 class="course-title">제주올레길</h3>
                                    <span class="course-region">제주 제주시</span>
                                </div>
                               


                            </div>

                        </article>

                        <article class="course-list-item">
                            <div class="course-thumb-wrap">
                                <img class="course-thumb"
                                    src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21?q=80&w=1200&auto=format&fit=crop"
                                    alt="여수 관광코스">
                            </div>
                            <div class="course-body">
                                <div class="course-head">
                                    <h3 class="course-title">안전, 예술, 바다, 명소까지 올인원 여수관광코스</h3>
                                    <span class="course-region">전남 여수시</span>
                                </div>
                               


                            </div>

                        </article>

                        <article class="course-list-item">
                            <div class="course-thumb-wrap">
                                <img class="course-thumb"
                                    src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=1200&auto=format&fit=crop"
                                    alt="세종 여행 코스">
                            </div>
                            <div class="course-body">
                                <div class="course-head">
                                    <h3 class="course-title">가족여행으로 떠나기 좋은 세종 1박2일 여행 코스</h3>
                                    <span class="course-region">세종</span>
                                </div>
                                


                            </div>

                        </article>

                    </div>
                </section>

                <!-- 사이드바 그대로 유지 -->
                <div th:replace="~{fragment/disaster :: tripSidebar}"></div>
            </div>

            <div id="detail-view" class="hidden">
                <div id="detail-content"></div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <div th:replace="~{main/footer :: footer}"></div>

    <!-- JS -->
    <script th:src="@{/javascript/trip.js}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
