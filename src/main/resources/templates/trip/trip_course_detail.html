<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해봄트립 - 여행코스 상세</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/trip_course_detail.css}">

    <style>
        #course-map { width: 100%; height: 500px; border-radius: 1rem; overflow: hidden; background: #f3f4f6; }
    </style>
</head>

<body>

<div th:replace="~{main/header :: header}"></div>

<main class="page-wrap">
    <div class="top-actions">
        <a th:href="@{/trip_course/trip_course}" class="back-btn">목록으로 돌아가기</a>
    </div>

    <section class="detail-container">

        <!-- courseNo를 JS에서 읽기 위한 hidden -->
        <input type="hidden" id="courseNo" th:value="${course != null ? course.courseNo : ''}">

        <!-- 상단 카테고리 -->
        <div class="course-top-label">
                <span
                        style="display:inline-flex; width:26px; height:26px; border:1px solid #bbb; border-radius:50%; align-items:center; justify-content:center; font-size:11px; color:#666;">
                    Easy
                </span>
            <span>코스</span>
        </div>

        <!-- 제목 -->
        <div class="course-title-row">
                <span class="course-badge"
                      th:text="${ '여행 코스'}">
                    1코스
                </span>

            <h1 class="course-title"
                th:text="${course != null and course.courseNm != null and course.courseNm != '' ? course.courseNm : '여행코스명 없음'}">
                여행코스명
            </h1>
        </div>

        <!-- 부가 정보 -->
        <div class="course-meta-line">
                <span>
                    코스 총거리 :
                    <strong
                            th:text="${course != null and course.courseDstnc != null and course.courseDstnc != '' ? ' ' + course.courseDstnc + ' ' : '정보 없음'}">
                        약 12km
                    </strong>
                </span>
        </div>

        <!-- 아이콘 영역 -->
        <div class="icon-stats-bar">
            <div class="stats-left">
                <div class="icon-item like-button" onclick="handleLike()" style="cursor:pointer;">
                    <i id="like-icon" data-lucide="heart"></i>
                    <span id="like-count">0</span>
                </div>

                <div class="icon-item">
                    <i data-lucide="eye"></i>
                    <span
                            th:text="${course != null and course.courseInqCnt != null ? course.courseInqCnt : 0}">0</span>
                </div>
            </div>
        </div>

        <!-- 본문 설명 -->
        <div class="course-desc-section">
            <div class="course-desc"
                 th:text="${course != null and course.courseInfo != null and course.courseInfo != '' ? course.courseInfo : '등록된 여행코스 소개가 없습니다.'}">
                여행코스 설명
            </div>
        </div>

        <!-- 지도 영역 -->
        <section class="course-map-section">
            <div class="section-divider"></div>
            <h3 class="text-xl font-bold mb-4">코스 경로 확인</h3>
            <div id="course-map" class="shadow-md"></div>
        </section>

        <!-- STEP UI 영역 -->
        <section class="course-step-section">
            <div class="step-section-header">
                <h2 class="step-section-title">코스 여행지 순서</h2>
                <p class="step-section-desc">이 코스에 포함된 여행지를 순서대로 확인할 수 있습니다.</p>
            </div>

            <!-- STEP 번호 라인 -->
            <div class="step-line-area">
                <div class="step-line" id="stepLine"></div>
                <div class="step-number-list" id="stepNumberList">
                    <!-- JS 동적 출력 -->
                </div>
            </div>

            <!-- STEP 카드 리스트 -->
            <div class="step-card-scroll-wrap">
                <button type="button" class="step-nav-btn prev" id="stepPrevBtn" aria-label="이전">‹</button>

                <div class="step-card-list" id="stepCardList">
                    <!-- JS 동적 출력 -->
                </div>

                <button type="button" class="step-nav-btn next" id="stepNextBtn" aria-label="다음">›</button>
            </div>

            <!-- 빈 데이터 안내 -->
            <div class="step-empty" id="stepEmpty" style="display:none;">
                등록된 여행지 STEP 정보가 없습니다.
            </div>
        </section>

        <!-- 하단 선택 여행지 상세카드 -->
        <section class="trip-detail-section">
            <div class="trip-detail-header">
                <h2 class="trip-detail-title">선택된 여행지 정보</h2>
                <p class="trip-detail-desc">STEP에서 선택한 여행지의 이름, 주소, 사진을 확인할 수 있습니다.</p>
            </div>

            <div class="trip-detail-card" id="tripDetailCard">
                <div class="trip-detail-info">
                    <div class="trip-detail-name" id="tripDetailName">여행지를 선택해주세요.</div>
                    <div class="trip-detail-address" id="tripDetailAddr">주소 정보가 여기에 표시됩니다.</div>
                </div>

                <div class="trip-detail-image-list" id="tripDetailImageList">
                    <div class="trip-detail-empty-image">선택된 여행지의 이미지가 여기에 표시됩니다.</div>
                </div>
            </div>
        </section>

    </section>
</main>

<div th:replace="~{main/footer :: footer}"></div>

<!-- 카카오 지도 SDK -->
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f660768a1b637b8b3e739404a972f5e8&libraries=services"></script>

<!-- 카카오 지도 초기화 -->
<script th:inline="javascript">
    /*<![CDATA[*/
    var courseItems = /*[[${course.courseItems}]]*/ [];

    window.addEventListener('load', function () {
        lucide.createIcons();

        var container = document.getElementById('course-map');
        if (!container || !window.kakao) return;

        // 유효한 좌표만 필터링
        var validItems = (courseItems || []).filter(function(item) {
            return item.tripLat && item.tripLot
                && parseFloat(item.tripLat) !== 0
                && parseFloat(item.tripLot) !== 0;
        });

        if (validItems.length === 0) {
            container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-weight:bold;">표시할 지도 좌표 데이터가 없습니다.</div>';
            return;
        }

        var map = new kakao.maps.Map(container, {
            center: new kakao.maps.LatLng(validItems[0].tripLat, validItems[0].tripLot),
            level: 5
        });

        var points = [];

        validItems.forEach(function(item, idx) {
            var pos = new kakao.maps.LatLng(item.tripLat, item.tripLot);
            points.push(pos);

            var pinContent = '<div style="width:28px;height:28px;background:#e8372b;color:#fff;'
                + 'border-radius:50% 50% 50% 0;transform:rotate(-45deg);'
                + 'display:flex;align-items:center;justify-content:center;'
                + 'font-size:12px;font-weight:bold;border:2px solid white;'
                + 'box-shadow:0 2px 6px rgba(0,0,0,0.3);">'
                + '<span style="transform:rotate(45deg);">' + (idx + 1) + '</span>'
                + '</div>';

            new kakao.maps.CustomOverlay({
                map: map,
                position: pos,
                content: pinContent,
                yAnchor: 1.0
            });
        });

        // 폴리라인
        if (points.length > 1) {
            new kakao.maps.Polyline({
                map: map,
                path: points,
                strokeWeight: 4,
                strokeColor: '#e8372b',
                strokeOpacity: 0.7
            });
        }

        // 지도 범위 자동 조정
        var bounds = new kakao.maps.LatLngBounds();
        points.forEach(function(p) { bounds.extend(p); });
        map.setBounds(bounds);
        if (map.getLevel() < 3) map.setLevel(3);
    });
    /*]]>*/
</script>

<script th:src="@{/javascript/trip_course_detail.js}"></script>

</body>

</html>
