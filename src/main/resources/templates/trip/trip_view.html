<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>해봄트립 - 여행지 상세</title>

    <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f660768a1b637b8b3e739404a972f5e8&autoload=false"
            type="text/javascript">
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <style>
        .star-rating-input label:hover,
        .star-rating-input label:hover ~ label,
        .star-rating-input input:checked ~ label {
            color: #fbbf24;
        }
    </style>
</head>

<body class="bg-white">

<div th:replace="~{main/header :: header}"></div>

<main class="max-w-5xl mx-auto px-4 py-8">
    <div class="text-center mb-10">
        <p class="text-gray-400 text-xs mb-2" id="detail-region" th:text="${vo != null ? vo.tripAddr : ''}"></p>

        <h1 class="text-3xl font-bold mb-4 text-slate-900 leading-tight" id="detail-title"
            th:text="${vo != null ? vo.tripNm : '로딩 중...'}">로딩 중...</h1>

        <div class="px-4 py-1 bg-orange-50 text-orange-600 font-bold inline-block text-[11px] rounded-sm shadow-sm border border-orange-100"
             id="detail-tag"
             th:text="${vo != null and vo.tripTagNm != null and vo.tripTagNm != '' ? vo.tripTagNm : '관련 테마 없음'}">
        </div>
    </div>

    <div class="flex justify-between items-center mb-6">
        <div class="flex gap-4 text-gray-500 text-sm font-medium">
            <button class="flex items-center gap-1.5 hover:text-red-500 transition-colors" onclick="handleLike()">
                <i data-lucide="heart" id="like-icon" size="18"></i>
                <span class="text-red-500 font-bold" id="detail-likes">0</span>
            </button>
            <span class="flex items-center gap-1.5">
                    <i data-lucide="eye" size="18"></i>
                    <span id="detail-views" th:text="${vo != null ? vo.tripInqCnt : 0}">0</span>
                </span>
        </div>
        <a th:href="@{/trip/trip}" class="flex items-center gap-1.5 font-bold text-orange-600 hover:underline">
            <i data-lucide="list" size="18"></i> 목록보기
        </a>
    </div>

    <div class="relative mb-12">
        <img class="w-full h-[450px] object-cover rounded-[32px] mb-12 shadow-lg bg-gray-100" id="detail-img"
             th:src="${vo != null ? vo.tripPathNm : ''}">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-1 gap-16 mb-16 border-b pb-16">
        <div class="space-y-8">
            <h3 class="text-lg font-bold flex items-center gap-2">
                <span class="w-1.5 h-5 bg-orange-600 rounded-full"></span> 소개
            </h3>
            <div class="text-gray-600 leading-relaxed text-sm whitespace-pre-wrap" id="detail-info"
                 th:text="${detailVo != null and detailVo.tripdtlInfo != null ? detailVo.tripdtlInfo : vo.tripNm + '에 대한 정보입니다.'}">
            </div>
        </div>
        <div class="space-y-8">
            <h3 class="text-lg font-bold flex items-center gap-2">
                <span class="w-1.5 h-5 bg-orange-600 rounded-full"></span> 여행지 정보
            </h3>
            <div class="space-y-6">
                <div class="flex items-start gap-4">
                    <div class="p-2 bg-gray-50 rounded-lg"><i class="text-gray-400" data-lucide="map-pin"
                                                              size="20"></i></div>
                    <div>
                        <p class="text-sm font-bold text-gray-800">주소</p>
                        <p class="text-gray-500 text-sm mt-1" id="detail-addr"
                           th:text="${vo != null ? vo.tripAddr : ''}"></p>
                    </div>
                </div>
                <div class="flex items-start gap-4">
                    <div class="p-2 bg-gray-50 rounded-lg">
                        <i class="text-gray-400" data-lucide="phone" size="20"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold text-gray-800">문의처</p>
                        <p class="text-gray-500 text-sm mt-1" id="detail-tel"
                           th:text="${detailVo != null and detailVo.tripdtlTel != null ? detailVo.tripdtlTel : '-'}">
                            -
                        </p>
                    </div>
                </div>
                <div class="mt-6">
                    <p class="text-sm font-bold text-gray-800 mb-2 flex items-center gap-2">
                        <i class="text-gray-400" data-lucide="map-pin" size="16"></i> 위치
                    </p>
                    <div id="trip-mini-map"
                         style="width:100%; height:350px; border-radius:16px; overflow:hidden; background:#f3f4f6;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-20">
        <h3 class="text-lg font-bold mb-6">후기 및 댓글 <span class="text-orange-500 ml-1 text-sm font-normal"
                                                         id="comment-count">0</span></h3>
        <div class="bg-gray-50/50 border border-gray-100 rounded-2xl p-8 mb-10">
            <div class="space-y-6">
                <div class="flex items-center gap-6">
                    <span class="text-sm font-bold text-gray-700 w-16">별점 등록</span>
                    <div class="flex flex-row-reverse justify-end star-rating-input">
                        <input class="hidden" id="st5" name="rating" type="radio" value="5"><label
                            class="cursor-pointer text-gray-300 text-2xl"
                            for="st5">★</label>
                        <input class="hidden" id="st4" name="rating" type="radio" value="4"><label
                            class="cursor-pointer text-gray-300 text-2xl"
                            for="st4">★</label>
                        <input class="hidden" id="st3" name="rating" type="radio" value="3"><label
                            class="cursor-pointer text-gray-300 text-2xl"
                            for="st3">★</label>
                        <input class="hidden" id="st2" name="rating" type="radio" value="2"><label
                            class="cursor-pointer text-gray-300 text-2xl"
                            for="st2">★</label>
                        <input class="hidden" id="st1" name="rating" type="radio" value="1"><label
                            class="cursor-pointer text-gray-300 text-2xl"
                            for="st1">★</label>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <span class="text-sm font-bold text-gray-700 w-16">사진 첨부</span>
                    <label class="bg-white border px-4 py-1.5 rounded-lg text-xs font-bold cursor-pointer hover:bg-gray-50 transition-colors"
                           for="image-upload">파일
                        선택</label>
                    <input accept="image/*" class="hidden" id="image-upload" type="file">
                    <span class="text-xs text-gray-400" id="file-name">선택된 파일 없음</span>
                </div>
                <div class="relative">
                        <textarea
                                class="w-full p-5 border border-gray-200 rounded-xl h-32 outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 bg-white transition-all"
                                id="comment-input"
                                placeholder="여행지의 생생한 후기를 남겨주세요."></textarea>
                </div>
                <div class="flex justify-end">
                    <button class="bg-orange-500 text-white px-10 py-3 rounded-xl font-bold hover:bg-orange-600 shadow-lg shadow-orange-500/20 transition-all"
                            onclick="submitComment()">
                        등록하기
                    </button>
                </div>
            </div>
        </div>
        <div class="divide-y divide-gray-100 border-t" id="comment-list"></div>
    </div>
</main>

<div th:replace="~{main/footer :: footer}"></div>

<script th:src="@{/javascript/trip.js}"></script>
<script th:inline="javascript">
    document.getElementById('image-upload')?.addEventListener('change', function (e) {
        const fileName = e.target.files[0]?.name || "선택된 파일 없음";
        document.getElementById('file-name').textContent = fileName;
    });
    window.addEventListener('load', () => {
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });
</script>

<script th:inline="javascript">
    const tripLat = /*[[${vo != null ? vo.tripLat : 0}]]*/ 0;
    const tripLot = /*[[${vo != null ? vo.tripLot : 0}]]*/ 0;
    const tripNm = /*[[${vo != null ? vo.tripNm : ''}]]*/ '';

    kakao.maps.load(() => {
        if (!tripLat || !tripLot) return;

        const container = document.getElementById('trip-mini-map');
        const map = new kakao.maps.Map(container, {
            center: new kakao.maps.LatLng(tripLat, tripLot),
            level: 3,
        });

        const marker = new kakao.maps.Marker({
            position: new kakao.maps.LatLng(tripLat, tripLot),
            map: map
        });

        const content = `
            <div style="
                padding: 7px 14px;
                background-color: white;
                border: 1px solid #ddd;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.12);
                font-size: 13px;
                font-weight: bold;
                width: max-content;
                text-align: center;
                white-space: nowrap;
                position: relative;
                margin-bottom: 20px;
            ">
                <a href="https://map.kakao.com/link/search/${encodeURIComponent(tripNm)}"
                   target="_blank"
                   style="text-decoration: none; color: #222; display: block;">
                    ${tripNm}
                </a>
                <div style="
                    position: absolute;
                    width: 10px;
                    height: 10px;
                    background: white;
                    border-right: 1px solid #ddd;
                    border-bottom: 1px solid #ddd;
                    bottom: -6px;
                    left: 50%;
                    transform: translateX(-50%) rotate(45deg);
                "></div>
            </div>
        `;

        const customOverlay = new kakao.maps.CustomOverlay({
            position: new kakao.maps.LatLng(tripLat, tripLot),
            content: content,
            xAnchor: 0.5,
            yAnchor: 1.45
        });

        // 맵에 오버레이를 표시합니다.
        customOverlay.setMap(map);
    });
</script>
</body>

</html>
