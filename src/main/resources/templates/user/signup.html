<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 해봄트립</title>
    
    <link rel="stylesheet" th:href="@{/css/signup.css}">

    <style>
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus {
            ring: 2px;
            ring-color: #f97316;
        }
        .hidden { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] },
                    colors: { orange: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c' } }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body class="h-screen w-full bg-orange-50/30 flex items-center justify-center py-4 md:py-8">

    <div class="w-full h-full md:max-h-[900px] md:w-[1200px] md:rounded-3xl bg-white shadow-2xl overflow-hidden flex relative">
        
        <div class="hidden lg:flex lg:w-5/12 relative items-center justify-center overflow-hidden flex-col bg-orange-50">
            <div class="absolute w-64 h-64 bg-orange-100 rounded-full -top-10 -left-10 opacity-50"></div>
            <div class="absolute w-96 h-96 bg-orange-200/30 rounded-full -bottom-20 -right-20 opacity-50"></div>
            <div class="relative z-10 mb-8 float-animation">
                <img th:src="@{/img/haebom_Main.png}" alt="해봄이 마스코트" class="w-64 h-auto drop-shadow-2xl">
            </div>
            <div class="relative z-10 text-center px-8">
                <h2 class="text-3xl font-bold text-slate-800 mb-3">"반가워요!"</h2>
                <p class="text-slate-700 text-lg leading-relaxed font-medium">해봄이와 함께 떠나는 설레는 여행,<br>지금 바로 시작해보세요.</p>
            </div>
        </div>

        <div class="w-full lg:w-7/12 flex flex-col bg-white relative h-full overflow-y-auto custom-scrollbar">
            <div class="p-8 md:p-12 lg:p-16">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">회원가입</h1>
                        <p class="text-slate-500">이미 계정이 있으신가요? <a th:href="@{/user/login}" class="text-orange-600 font-bold hover:underline">로그인</a></p>
                    </div>
                    <a th:href="@{/}" class="text-slate-400 hover:text-orange-600 transition-colors flex items-center gap-1 text-sm font-medium">
                        <i data-lucide="home" class="w-4 h-4"></i> <span class="hidden sm:inline">홈으로</span>
                    </a>
                </div>

                <form id="signup-form" th:object="${userVO}" class="space-y-8"> 
                    
                    <div class="space-y-5">
                        <h3 class="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 flex items-center gap-2">
                            <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded-full">Step 1</span> 기본 정보
                        </h3>

                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700">이메일</label>
                            <div class="flex gap-2">
                                <input type="email" id="email" th:field="*{userEmlAddr}" class="flex-1 px-4 py-3 border border-slate-200 rounded-xl outline-none" placeholder="example@mail.com">
                                <button type="button" id="btn-send-code" class="px-4 py-3 bg-slate-800 text-white rounded-xl font-bold min-w-[100px]">인증번호 받기</button>
                            </div>
                            <p id="email-message" class="text-xs hidden"></p> 
                        </div>

                        <div id="email-verify-area" class="space-y-2 mt-3" style="display:none;">
                            <div class="relative flex gap-2">
                                <div class="relative flex-1">
                                    <input type="text" id="verify-code" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none" placeholder="인증번호 6자리">
                                    <span id="email-timer" class="absolute right-4 top-1/2 -translate-y-1/2 text-orange-500 font-medium text-sm hidden">03:00</span>
                                </div>
                                <button type="button" id="btn-verify-code" class="px-4 py-3 bg-orange-500 text-white rounded-xl font-bold">확인</button>
                            </div>
                            <p id="email-verify-message" class="text-xs mt-1 hidden"></p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-700">비밀번호 *</label>
                                <input type="password" id="password" th:field="*{userEnpswd}" class="form-input" placeholder="8자 이상" required>
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-700">비밀번호 확인 *</label>
                                <input type="password" id="password-confirm" class="form-input" placeholder="비밀번호 재입력" required>
                            </div>
                        </div>
                        <p id="password-message" class="text-xs hidden mt-1"></p> <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700">닉네임 *</label>
                            <div class="flex gap-2">
                                <input type="text" id="nickname" th:field="*{userNick}" class="flex-1 px-4 py-3 rounded-xl border border-slate-200" placeholder="닉네임 입력" required>
                                <button type="button" id="btn-check-nickname" class="px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-xl whitespace-nowrap">중복 확인</button>
                            </div>
                            <input type="hidden" id="nickCheckDone" value="N">
                        </div>

                        <div class="space-y-4 pt-2 border-t border-slate-50 mt-4">
                            <div class="flex gap-2">
                                <input type="text" id="zipcode" th:field="*{userZip}" class="form-input w-32 bg-slate-50" placeholder="우편번호" readonly>
                                <button type="button" id="btn-search-address" class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold">주소 검색</button>
                            </div>
                            <input type="text" id="addr-basic" th:field="*{userAddr}" class="form-input w-full bg-slate-50" placeholder="기본 주소" readonly>
                            <input type="text" id="addr-detail" th:field="*{userDaddr}" class="form-input w-full" placeholder="상세 주소">
                        </div>
                    </div>

                    <div class="space-y-5 pt-4">
                        <h3 class="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 flex items-center gap-2">
                            <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded-full">Step 2</span> 개인 정보
                        </h3>
                        <div class="space-y-1.5">
                            <label class="text-sm font-bold text-slate-700">이름 *</label>
                            <input type="text" name="userNm" th:field="*{userNm}" class="form-input" placeholder="실명 입력" required>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-sm font-bold text-slate-700">전화번호 *</label>
                            <input type="tel" id="phone" th:field="*{userTelno}" class="form-input" placeholder="010-1234-5678" required>
                            <p id="phone-error" class="text-xs text-green-600 mt-1 hidden">이미 사용 중인 전화번호입니다.</p>
                            <p id="phone-success" class="text-xs text-green-600 mt-1 hidden">사용 가능한 전화번호입니다.</p>
                            <input type="hidden" id="phoneCheckDone" value="N">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-700">생년월일 *</label>
                                <input type="date" id="birth_picker" class="form-input h-[48px]" required>
                                <input type="hidden" th:field="*{userBrdt}" id="userBrdt">
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-700 block">성별 *</label>
                                <div class="flex gap-6 items-center h-[48px]">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" th:field="*{userGndr}" value="M" class="peer h-5 w-5 appearance-none rounded-full border border-slate-300 checked:bg-orange-500" required>
                                        <span class="text-slate-600 font-medium">남성</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" th:field="*{userGndr}" value="F" class="peer h-5 w-5 appearance-none rounded-full border border-slate-300 checked:bg-orange-500">
                                        <span class="text-slate-600 font-medium">여성</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-5 pt-4">
                        <div class="flex justify-between items-end border-b border-slate-100 pb-2">
                            <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                                <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded-full">Step 3</span> 여행 테마
                            </h3>
                            <span class="text-xs text-slate-400 font-medium">관심있는 테마를 3개 이상 선택해주세요</span>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2" id="theme-container">
                            <div class="col-span-full py-8 text-center text-slate-400">
                                <span class="inline-block animate-spin mr-2">⌛</span> 여행 테마를 불러오는 중입니다...
                            </div>
                        </div>
                    </div>

                    <div class="pt-6">
                        <button type="submit" class="w-full py-4 px-6 bg-orange-600 text-white text-lg font-bold rounded-xl hover:bg-orange-700 shadow-lg transition-all transform hover:-translate-y-1">
                            해봄트립 시작하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{/javascript/signup.js}"></script>
    <script>
        // 생년월일 처리: 날짜 선택 시 yyyyMMdd 숫자로 변환하여 hidden 필드에 삽입
        document.getElementById('birth_picker').addEventListener('change', function() {
            const val = this.value.replace(/-/g, ''); 
            document.getElementById('userBrdt').value = val; 
        });

        // 아이콘 초기화
        lucide.createIcons();
    </script>
</body>
</html>
