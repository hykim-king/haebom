<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 해봄트립</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="../css/signup.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    },
                    colors: {
                        orange: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            500: '#f97316',
                            600: '#ea580c',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- jQuery (AJAX 및 간편한 DOM 조작을 위해 추가) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!--카카오 주소 API-->
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body class="h-screen w-full bg-orange-50/30 flex items-center justify-center py-4 md:py-8">

    <!-- Signup Container -->
    <div class="w-full h-full md:h-full md:max-h-[900px] md:w-[1200px] md:rounded-3xl bg-white shadow-2xl overflow-hidden flex relative">
        
       
        <!-- Left Side: Image & Branding (Fixed) -->
     <div class="hidden lg:flex lg:w-5/12 relative items-center justify-center overflow-hidden flex-col bg-orange-50">
         <div class="absolute w-64 h-64 bg-orange-100 rounded-full -top-10 -left-10 opacity-50"></div>
            <div class="absolute w-96 h-96 bg-orange-200/30 rounded-full -bottom-20 -right-20 opacity-50"></div>
    
                <div class="relative z-10 mb-8 float-animation">
                    <img src="../img/haebom_Main.png" alt="해봄이 마스코트" class="w-64 h-auto drop-shadow-2xl">
                </div>

            <div class="relative z-10 text-center px-8">
                <h2 class="text-3xl font-bold text-slate-800 mb-3 font-sans">"반가워요!"</h2>
                <p class="text-slate-700 text-lg leading-relaxed font-medium">
                    해봄이와 함께 떠나는 설레는 여행,<br>
                    지금 바로 시작해보세요.
                </p>
            </div>
     </div>
       

        <!-- Right Side: Signup Form (Scrollable) -->
        <div class="w-full lg:w-7/12 flex flex-col bg-white relative h-full overflow-y-auto custom-scrollbar">
            
            <div class="p-8 md:p-12 lg:p-16">
                <!-- Header -->
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">회원가입</h1>
                        <p class="text-slate-500">이미 계정이 있으신가요? <a href="login.html" class="text-orange-600 font-bold hover:underline">로그인</a></p>
                    </div>
                    <a href="../html/main_Org.html" class="text-slate-400 hover:text-orange-600 transition-colors flex items-center gap-1 text-sm font-medium">
                        <i data-lucide="home" class="w-4 h-4"></i> <span class="hidden sm:inline">홈으로</span>
                    </a>
                </div>

                <form id="signup-form" th:action="@{/user/signup}" th:object="${userVO}" method="post" class="space-y-8">                    
                        <div class="space-y-5">
                            <h3 class="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 flex items-center gap-2">
                                <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded-full">Step 1</span> 기본 정보
                            </h3>

                            <div class="space-y-1.5">
                            <label class="text-sm font-bold text-slate-700">
                                이메일 인증 <span class="text-orange-500">*</span>
                            </label>

                            <div class="flex gap-2">
                                <!-- ✅ id=email 추가 -->
                                <input type="email"
                                    id="email"
                                    th:field="*{userEmlAddr}"
                                    class="form-input flex-1"
                                    placeholder="example@haebom.com"
                                    required>

                                <button type="button" id="btn-send-code"
                                        class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold">
                                인증번호 전송
                                </button>
                            </div>

                            <!-- ✅ 1) 전송/오류 메시지 출력 영역 -->
                            <p id="email-message" class="text-sm hidden"></p>

                            <!-- ✅ 2) 인증번호 입력 영역 (처음엔 숨김) -->
                            <div id="email-verify-area" class="hidden mt-2">
                                <div class="flex gap-2">
                            <!--인증 번호 입력 칸 -->
                                <input type="text" id="verify-code"
                                        class="form-input flex-1"
                                        placeholder="인증번호 6자리 입력">
                                <button type="button" id="btn-verify-code"
                                        class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold">
                                    인증번호 확인
                                </button>
                                </div>
                                <p id="email-verify-message" class="text-sm hidden mt-1"></p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-700">비밀번호 <span class="text-orange-500">*</span></label>
                                <input type="password" id="password" th:field="*{userEnpswd}" class="form-input" placeholder="8자 이상" required>
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-700">비밀번호 확인 <span class="text-orange-500">*</span></label>
                                <input type="password" id="password-confirm" class="form-input" placeholder="비밀번호 재입력" required>
                            </div>
                        </div>
                        <p id="password-message" class="text-sm hidden mt-1"></p>

                        <div class="space-y-1.5">
                            <label class="text-sm font-bold text-slate-700">닉네임 <span class="text-orange-500">*</span></label>
                            <div class="flex gap-2">
                                <input type="text" id="nickname" th:field="*{userNick}" class="form-input flex-1" placeholder="2-10자" required>
                                <button type="button" id="btn-check-nickname" class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold">중복 확인</button>
                            </div>
                            <p id="nickname-message" class="text-sm hidden mt-1"></p>
                        </div>

                        <div class="space-y-4 pt-2 border-t border-slate-50 mt-4">
                            <div class="flex gap-2">
                                <input type="text" id="zipcode" th:field="*{userZip}" class="form-input w-32 bg-slate-50" placeholder="우편번호" readonly>
                                <button type="button" id="btn-search-address" class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold">주소 검색</button>
                            </div>
                            <input type="text" id="addr-basic" th:field="*{userAddr}" class="form-input w-full bg-slate-50" placeholder="기본 주소" readonly>
                            <input type="text" id="addr-detail" th:field="*{userDaddr}" class="form-input w-full" placeholder="상세 주소">
                        </div>
                    </div>

                    <div class="space-y-5 pt-4">
                        <h3 class="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2 flex items-center gap-2">
                            <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded-full">Step 2</span> 개인 정보
                        </h3>
                        <div class="space-y-1.5">
                            <label class="text-sm font-bold text-slate-700">이름 <span class="text-orange-500">*</span></label>
                            <input type="text" th:field="*{userNm}" class="form-input" placeholder="실명 입력" required>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-sm font-bold text-slate-700">전화번호 <span class="text-orange-500">*</span></label>
                            <input type="tel" th:field="*{userTelno}" class="form-input" placeholder="010-1234-5678" required>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-700">생년월일 <span class="text-orange-500">*</span></label>
                                <input type="date" id="birth_picker" class="form-input h-[48px]" required>
                                <input type="hidden" th:field="*{userBrdt}" id="userBrdt">
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-sm font-bold text-slate-700 block">성별 <span class="text-orange-500">*</span></label>
                                <div class="flex gap-6 items-center h-[48px]">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" th:field="*{userGndr}" value="M" class="peer h-5 w-5 appearance-none rounded-full border border-slate-300 checked:bg-orange-500">
                                        <span class="text-slate-600 font-medium">남성</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="radio" th:field="*{userGndr}" value="F" class="peer h-5 w-5 appearance-none rounded-full border border-slate-300 checked:bg-orange-500">
                                        <span class="text-slate-600 font-medium">여성</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 3. 여행 취향 섹션 -->
                    <div class="space-y-5 pt-4">
                        <div class="flex justify-between items-end border-b border-slate-100 pb-2">
                            <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                                <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded-full">Step 3</span> 여행 테마
                            </h3>
                            <span class="text-xs text-slate-400 font-medium">관심있는 테마를 3개 이상 선택해주세요</span>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2" id="theme-container">
                            <!-- 로딩 중 메시지 (JS가 로드되면 사라짐) -->
                            <div class="col-span-full py-8 text-center text-slate-400">
                                <span class="inline-block animate-spin mr-2">⏳</span> 여행 테마를 불러오는 중입니다...
                            </div>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="pt-6">
                        <button type="submit" class="w-full py-4 px-6 bg-orange-600 text-white text-lg font-bold rounded-xl hover:bg-orange-700 transition-all shadow-lg shadow-orange-200 transform hover:-translate-y-0.5">
                            해봄트립 시작하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="../javascript/signup.js"></script>
    <script>
        // 생년월일 처리: 날짜 선택 시 yyyyMMdd 숫자로 변환하여 hidden 필드에 삽입
        document.getElementById('birth_picker').addEventListener('change', function() {
            const val = this.value.replace(/-/g, ''); // 2024-02-23 -> 20240223
            document.getElementById('userBrdt').value = parseInt(val);
        });

        lucide.createIcons();
    </script>
</body>
</html>
