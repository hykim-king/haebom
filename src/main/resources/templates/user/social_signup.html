<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>추가 정보 입력 - 해봄트립</title>

    <link rel="stylesheet" th:href="@{/css/signup.css}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <style>
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-animation { animation: float 3s ease-in-out infinite; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] },
                    colors: { 
                        orange: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 500: '#f97316', 600: '#ea580c' } 
                    }
                }
            }
        }
    </script>
</head>
<body class="h-screen w-full bg-orange-50/30 flex items-center justify-center py-4 md:py-8">

    <div class="w-full h-full md:max-h-[900px] md:w-[1200px] md:rounded-3xl bg-white shadow-2xl overflow-hidden flex relative">
        
        <div class="hidden lg:flex lg:w-5/12 relative items-center justify-center overflow-hidden flex-col bg-orange-50">
            <div class="absolute w-64 h-64 bg-orange-100 rounded-full -top-10 -left-10 opacity-50"></div>
            <div class="absolute w-96 h-96 bg-orange-200/30 rounded-full -bottom-20 -right-20 opacity-50"></div>
            <div class="relative z-10 mb-8 float-animation">
                <img th:src="@{/img/haebom_Main.png}" alt="해봄이 마스코트" class="w-64 h-auto drop-shadow-2xl">
            </div>
            <div class="relative z-10 text-center px-8">
                <h2 class="text-3xl font-bold text-slate-800 mb-3">"거의 다 됐어요!"</h2>
                <p class="text-slate-700 text-lg leading-relaxed font-medium">카카오 계정과 연결되었습니다.<br>나머지 정보만 입력하면 끝나요!</p>
            </div>
        </div>

        <div class="w-full lg:w-7/12 flex flex-col bg-white relative h-full overflow-y-auto custom-scrollbar">
            <div class="p-8 md:p-12 lg:p-16">
                <div class="mb-10 text-left">
                    <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">추가 정보 입력</h1>
                    <p class="text-slate-500">여행을 시작하기 위해 아래 정보를 완성해주세요.</p>
                </div>

                <form th:action="@{/user/social-signup}" method="post" id="signupForm" class="space-y-8">
                    
                    <div class="space-y-5">
                        <h3 class="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2">기본 정보</h3>
                        
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700">닉네임</label>
                            <div class="flex gap-2">
                                <input type="text" name="userNick" id="nickname" 
                                       th:value="${kakaoNick}"
                                       class="form-input" 
                                       placeholder="닉네임 (2~10자, 한글 초성/모음 불가)" required>
                                <button type="button" id="btn-check-nick" 
                                        class="px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-all whitespace-nowrap">
                                    중복 확인
                                </button>
                            </div>
                            <input type="hidden" id="nickCheckDone" value="N">
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700">전화번호 <span class="text-orange-500">*</span></label>
                            <input type="tel" name="userTelno" id="userTelno" 
                                   class="form-input" 
                                   placeholder="010-1234-5678" required />
                        </div>

                        <div class="space-y-3">
                            <label class="text-sm font-bold text-slate-700">주소 <span class="text-orange-500">*</span></label>
                            <div class="flex gap-2">
                                <input type="text" id="zipcode" name="userZip" 
                                       class="form-input w-32 bg-slate-50" 
                                       placeholder="우편번호" readonly required>
                                <button type="button" id="btn-search-address" 
                                        class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold hover:bg-slate-700">
                                    주소 검색
                                </button>
                            </div>
                            <input type="text" id="addr-basic" name="userAddr" 
                                   class="form-input bg-slate-50" 
                                   placeholder="기본 주소" readonly required>
                            <input type="text" id="addr-detail" name="userDaddr" 
                                   class="form-input" 
                                   placeholder="상세 주소">
                        </div>
                    </div>

                    <div class="space-y-5 pt-4">
                        <h3 class="text-lg font-bold text-slate-800 border-b border-slate-100 pb-2">개인 정보</h3>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">생년월일 <span class="text-orange-500">*</span></label>
                                <input type="date" id="birth_picker" class="form-input" required>
                                <input type="hidden" name="userBrdt" id="userBrdt">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-slate-700">성별 <span class="text-orange-500">*</span></label>
                                <div class="flex gap-6 items-center h-12">
                                    <label class="flex items-center gap-2 cursor-pointer group">
                                        <input type="radio" name="userGndr" value="M" class="h-5 w-5 accent-orange-500" checked> 
                                        <span class="text-slate-600 font-medium">남성</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer group">
                                        <input type="radio" name="userGndr" value="F" class="h-5 w-5 accent-orange-500"> 
                                        <span class="text-slate-600 font-medium">여성</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4 pt-4">
                        <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                            <label class="text-lg font-bold text-slate-800">관심 여행 테마</label>
                            <span class="text-xs text-slate-400 font-medium">3개 이상 선택해주세요</span>
                        </div>
                        
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="theme-container">
                            <div class="col-span-full py-8 text-center text-slate-400">
                                <span class="inline-block animate-spin mr-2">⏳</span> 테마를 불러오는 중입니다...
                            </div>
                        </div>
                        
                        <input type="hidden" name="userTag" id="userTag">
                    </div>

                    <div class="pt-6">
                        <button type="submit" class="w-full py-4 bg-orange-600 text-white text-lg font-bold rounded-xl hover:bg-orange-700 transition-all shadow-lg transform hover:-translate-y-1">
                            해봄트립 시작하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{/javascript/social_signup.js}"></script>
    <script>
        // 생년월일 처리 (signup.html의 로직 적용)
        document.getElementById('birth_picker').addEventListener('change', function() {
            const val = this.value.replace(/-/g, ''); 
            document.getElementById('userBrdt').value = val; 
        });
        // 아이콘 초기화
        lucide.createIcons();
    </script>
</body>
</html>
