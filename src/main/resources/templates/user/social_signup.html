<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>추가 정보 입력 - 해봄트립</title>

    <link rel="stylesheet" href="../css/signup.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] },
                    colors: { 
                        orange: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c' } 
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen w-full bg-orange-50/30 flex items-center justify-center py-10">
    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-8 md:p-12">
        <div class="mb-10 text-center">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">마지막 단계!</h1>
            <p class="text-slate-500">여행을 시작하기 위해 추가 정보를 입력해주세요.</p>
        </div>

        <form th:action="@{/user/social-signup}" method="post" id="signupForm" class="space-y-8">
            
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700">닉네임</label>
                <div class="flex gap-2">
                    <input type="text" name="userNick" id="nickname" 
                           th:value="${kakaoNick}"
                           class="flex-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 transition-all outline-none" 
                           placeholder="사용하실 닉네임을 입력하세요" required>
                    <button type="button" id="btn-check-nick" 
                            class="px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-all whitespace-nowrap">
                        중복 확인
                    </button>
                </div>
                <input type="hidden" id="nickCheckDone" value="N">
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700">전화번호 <span class="text-orange-500">*</span></label>
                <input type="tel" name="userTelno" id="userTelno" 
                       class="w-full h-12 px-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 outline-none" 
                       placeholder="010-1234-5678" required />
            </div>

            <div class="space-y-3">
                <label class="text-sm font-bold text-slate-700">주소 <span class="text-orange-500">*</span></label>
                <div class="flex gap-2">
                    <input type="text" id="zipcode" name="userZip" 
                           class="w-32 h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 outline-none" 
                           placeholder="우편번호" readonly required>
                    <button type="button" id="btn-search-address" 
                            class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold hover:bg-slate-700">
                        주소 검색
                    </button>
                </div>
                <input type="text" id="addr-basic" name="userAddr" 
                       class="w-full h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 outline-none" 
                       placeholder="기본 주소" readonly required>
                <input type="text" id="addr-detail" name="userDaddr" 
                       class="w-full h-12 px-4 rounded-xl border border-slate-200 outline-none" 
                       placeholder="상세 주소">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">생년월일 <span class="text-orange-500">*</span></label>
                    <input type="date" id="birth_picker" class="w-full h-12 px-4 rounded-xl border border-slate-200 outline-none" required>
                    <input type="hidden" name="userBrdt" id="userBrdt">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">성별 <span class="text-orange-500">*</span></label>
                    <div class="flex gap-6 items-center h-12">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="radio" name="userGndr" value="M" class="h-5 w-5 accent-orange-500" checked> 
                            <span class="text-slate-600">남성</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="radio" name="userGndr" value="F" class="h-5 w-5 accent-orange-500"> 
                            <span class="text-slate-600">여성</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <label class="text-sm font-bold text-slate-700">관심 여행 테마</label>
                    <span class="text-xs text-slate-400 font-medium">3개 이상 선택해주세요</span>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="theme-container">
                    <div class="col-span-full py-8 text-center text-slate-400">
                        <span class="inline-block animate-spin mr-2">⏳</span> 테마를 불러오는 중입니다...
                    </div>
                </div>
                
                <input type="hidden" name="userTag" id="userTag">
            </div>

            <button type="submit" class="w-full py-4 bg-orange-600 text-white text-lg font-bold rounded-xl hover:bg-orange-700 transition-all shadow-lg transform hover:-translate-y-0.5">
                가입 완료
            </button>
        </form>
    </div>

    <script src="../javascript/social_signup.js"></script>
</body>
</html>
