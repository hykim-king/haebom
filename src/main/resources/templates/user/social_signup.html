<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>추가 정보 입력 - 해봄트립</title>

    <link rel="stylesheet" href="../css/signup.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] },
                    colors: { 
                        orange: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c' } 
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen w-full bg-orange-50/30 flex items-center justify-center py-10">
    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-8 md:p-12">
        <div class="mb-10 text-center">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">마지막 단계!</h1>
            <p class="text-slate-500">여행을 시작하기 위해 추가 정보를 입력해주세요.</p>
        </div>

        <form th:action="@{/user/social-signup}" method="post" id="signupForm" class="space-y-8">
            
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700">닉네임 <span class="text-orange-500">*</span></label>
                <input type="text" id="nickname" name="userNick" th:value="${kakaoNick}" class="w-full h-12 px-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 outline-none" required />
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700">전화번호 <span class="text-orange-500">*</span></label>
                <input type="tel" name="userTelno" class="w-full h-12 px-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="010-1234-5678" required />
            </div>

            <div class="space-y-3">
              <label class="text-sm font-bold text-slate-700">주소 <span class="text-orange-500">*</span></label>
              <div class="flex gap-2">
                  <input type="text" id="zipcode" name="userZip" 
                        class="w-32 h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 outline-none" 
                        placeholder="우편번호" readonly required>
                  
                  <button type="button" id="btn-search-address" 
                          class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold hover:bg-slate-700">
                      주소 검색
                  </button>
              </div>
              
              <input type="text" id="addr-basic" name="userAddr" 
                    class="w-full h-12 px-4 rounded-xl border border-slate-200 bg-slate-50 outline-none" 
                    placeholder="기본 주소" readonly required>
              
              <input type="text" id="addr-detail" name="userDaddr" 
                    class="w-full h-12 px-4 rounded-xl border border-slate-200 outline-none" 
                    placeholder="상세 주소">
          </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">생년월일 <span class="text-orange-500">*</span></label>
                    <input type="date" id="birth_picker" class="w-full h-12 px-4 rounded-xl border border-slate-200 outline-none" required>
                    <input type="hidden" name="userBrdt" id="userBrdt">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700">성별 <span class="text-orange-500">*</span></label>
                    <div class="flex gap-6 items-center h-12">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="radio" name="userGndr" value="M" class="h-5 w-5 accent-orange-500" checked> 
                            <span class="text-slate-600">남성</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="radio" name="userGndr" value="F" class="h-5 w-5 accent-orange-500"> 
                            <span class="text-slate-600">여성</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <label class="text-sm font-bold text-slate-700">관심 여행 테마</label>
                    <span class="text-xs text-slate-400 font-medium">3개 이상 선택해주세요</span>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="theme-container">
                    <div class="col-span-full py-8 text-center text-slate-400">
                        <span class="inline-block animate-spin mr-2">⏳</span> 테마를 불러오는 중입니다...
                    </div>
                </div>
                
                <input type="hidden" name="userTag" id="userTag">
            </div>

            <button type="submit" class="w-full py-4 bg-orange-600 text-white text-lg font-bold rounded-xl hover:bg-orange-700 transition-all shadow-lg transform hover:-translate-y-0.5">
                가입 완료
            </button>
        </form>
    </div>

    <script src="../javascript/signup.js"></script>
      <script>
          $(document).ready(function() {
              // 1. 생년월일 처리
              $('#birth_picker').on('change', function() {
                  const val = this.value.replace(/-/g, '');
                  $('#userBrdt').val(val); 
              });

              // 2. 가입 버튼 클릭 시 검증 (submit 이벤트 가로채기)
              $('#signupForm').on('submit', function(e) {
                  // [수정 핵심] name="theme"가 없으므로 container 내의 모든 체크된 input을 찾습니다.
                  const checkedInputs = $('#theme-container input[type="checkbox"]:checked');
                  const checkedCount = checkedInputs.length;

                  if (checkedCount < 3) {
                      e.preventDefault(); // 폼 전송 중단
                      alert("여행 테마를 3개 이상 선택해주세요. (현재 " + checkedCount + "개 선택됨)");
                      return false;
                  }

                  // 3. 서버 전송용 userTag 값 생성
                  const tags = checkedInputs.map(function() {
                      return $(this).val(); // '산', '폭포' 등의 label 값이 들어갑니다.
                  }).get().join(',');

                  $('#userTag').val(tags);
                  
                  return true;
              });
          });
      </script>

      <script>
      $(document).ready(function() {
          // 1. 생년월일 처리
          $('#birth_picker').on('change', function() {
              const val = this.value.replace(/-/g, '');
              $('#userBrdt').val(val); 
          });

          // 2. 가입 버튼 클릭 시 검증 및 메시지 처리
          $('#signupForm').on('submit', function(e) {
              // 기본 폼 제출 막기 (검증 후 직접 제출하거나 성공 메시지 후 제출)
              e.preventDefault();

              // --- [항목별 검증 로직] ---
              
              // 닉네임 검증
              if (!$('#nickname').val().trim()) {
                  alert("닉네임을 입력해주세요.");
                  $('#nickname').focus();
                  return false;
              }

              // 전화번호 검증
              if (!$('input[name="userTelno"]').val().trim()) {
                  alert("전화번호를 입력해주세요.");
                  $('input[name="userTelno"]').focus();
                  return false;
              }

              // 주소 검증 (우편번호로 체크)
              if (!$('#zipcode').val()) {
                  alert("주소 검색을 통해 주소를 입력해주세요.");
                  $('#btn-search-address').click(); // 자동으로 주소창 띄워주는 센스
                  return false;
              }

              // 생년월일 검증
              if (!$('#birth_picker').val()) {
                  alert("생년월일을 선택해주세요.");
                  $('#birth_picker').focus();
                  return false;
              }

              // 성별 검증 (Radio 버튼 체크 확인)
              if (!$('input[name="userGndr"]:checked').val()) {
                  alert("성별을 선택해주세요.");
                  return false;
              }

              // 테마 검증 (3개 이상)
              const checkedInputs = $('#theme-container input[type="checkbox"]:checked');
              const checkedCount = checkedInputs.length;

              if (checkedCount < 3) {
                  alert("여행 테마를 3개 이상 선택해주세요. (현재 " + checkedCount + "개 선택됨)");
                  return false;
              }

              // --- [데이터 가공 및 최종 성공 메시지] ---

              // 선택된 테마들을 userTag hidden 필드에 저장
              const tags = checkedInputs.map(function() {
                  return $(this).val();
              }).get().join(',');
              $('#userTag').val(tags);

              // 가입 환영 메시지 출력
              alert("가입을 환영합니다! 해봄트립을 자유롭게 이용해보세요.");

              // 폼 실제 제출
              this.submit();
          });
      });
  </script>

</body>
</html>
